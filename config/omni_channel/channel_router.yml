automation_levels:
  inbound_website: full
  lead_ad_followup: full
  whatsapp_optin: full
  webinar_followup: full
  newsletter: full
  google_lead_form: full
  linkedin_lead_gen: full
  meta_lead_ads: full
  email: partial
  website_form: partial
  partner_intro: partial
  content_seo: partial
  linkedin: manual
  cold_whatsapp: manual
  phone_call: manual
  proposal_submission: manual
  procurement_portal: manual
  community_post: manual

channel_descriptions:
  email: "Direct email outreach — draft prepared, founder reviews and sends."
  linkedin: "LinkedIn connection note or DM — manual send only per LinkedIn TOS."
  whatsapp_optin: "Reply to opt-in WhatsApp leads only — auto-reply allowed."
  website_form: "Contact form submission — draft prepared, partial automation."
  google_lead_form: "Inbound lead from Google Ads — auto follow-up sequence."
  linkedin_lead_gen: "Inbound lead from LinkedIn Lead Gen Form — auto follow-up."
  meta_lead_ads: "Inbound lead from Meta Lead Ads — auto follow-up sequence."
  seo_content: "SEO blog/content asset — partial automation for publishing."
  webinar: "Webinar invitation or follow-up — partial automation."
  phone_call: "Outbound call — call script prepared, human dials."
  partnership: "Warm intro via partner — draft prepared, partial automation."
  procurement_portal: "Government procurement portal submission — manual only."
  community: "Community/forum post or comment — manual only."
  retargeting: "Paid retargeting ad copy — full automation for ad serving."
  founder_brand: "Founder personal brand post — manual only."
