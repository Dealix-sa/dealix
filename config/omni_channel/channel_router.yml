    segment: legal_local_arabic
  - sector: legal
    language: english
    segment: consulting_professional
  - sector: legal
    language: bilingual
    segment: consulting_professional
  - sector: facilities_management
    segment: facilities_management
  - sector: consulting
    segment: consulting_professional
  - sector: real_estate
    segment: real_estate
  - sector: healthcare
    segment: healthcare_local
  - sector: education_training
    segment: consulting_professional
  - sector: international_company
    segment: international_gcc
  - sector: local_sme
    segment: local_sme
  - sector: government_adjacent
    segment: government_related
  - sector: technology
