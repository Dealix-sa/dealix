# Saudi Sector Taxonomy · تصنيف القطاعات السعودية
#
# Canonical sector enum used across the Dealix prospecting + closing
# pipeline. Each sector has:
#   - vertical_code (B2B/B2C/B2G)
#   - compliance_requirements (PDPL plus sector-specific regulators)
#   - decision_maker_titles (Saudi-specific common roles)
#   - sales_cycle_days_range (is_estimate=true)
#   - avg_deal_size_sar_range (is_estimate=true)
#   - entry_offer_recommendation (Sprint/Managed Ops/Custom AI)
#   - signals_to_watch
#   - icp_weight_overrides (sector-specific scoring weights;
#     overrides defaults in auto_client_acquisition/icp_scorer.py)
#
# Numbers are estimates from public Saudi market reports unless
# tagged otherwise. Doctrine #6 (NO_UNVERIFIED_OUTCOMES) — no
# guaranteed-results claims derived from these ranges.

meta:
  version: 1
  effective_date: "2026-06-01"
  next_review: "2026-09-01"
  source_note: "Estimates from SAGIA, Monsha'at, SAMA, PIF public reports + Wamda + MENA Bytes. Always tagged is_estimate=true at the metric level."

sectors:
  TECHNOLOGY:
    name_ar: "التقنية والـ SaaS"
    name_en: "Technology / SaaS"
    vertical_code: B2B
    compliance_requirements: [PDPL, CITC, ZATCA]
    decision_maker_titles:
      - Founder/CEO
      - CTO
      - VP Engineering
      - Head of Product
    typical_company_size_range: "5-200"
    sales_cycle_days_range: "14-45"
    avg_deal_size_sar_range: "499-15000"
    entry_offer_recommendation: pilot_managed
    competitor_landscape_note: "Fragmented — Saudi-built SaaS startups + global tools. No dominant Saudi-first revenue OS yet."
    signals_to_watch:
      - Series A/B funding announcements
      - Hiring "VP Sales" or "Head of Growth"
      - Public PDPL gap or governance pain
      - Expansion to GCC announcements
    icp_weight_overrides:
      tech_stack: 25
      intent: 25
      sector: 15
      compliance_posture: 10
    is_estimate: true

