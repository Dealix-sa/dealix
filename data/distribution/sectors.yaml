# Dealix — Sector Prioritization (Revenue Execution OS)
# تحديد أولوية القطاعات — لا تستهدف كل الناس.
#
# Each sector is scored 0–100 from weighted components. `dealix.distribution.sectors`
# computes `priority` from `scores` × `weights` (so the number is verifiable, never invented).
# `offer_ref` points to a canonical offer id in os/03_OFFERS.yml — pricing stays in one place.
#
# Components (max points):
#   pain_intensity 20 · lead_volume 15 · decision_maker_access 15 · budget_ability 15
#   proof_speed 15 · delivery_simplicity 10 · saudi_localization_advantage 10  → 100

schema_version: "1.0"

weights:
  pain_intensity: 20
  lead_volume: 15
  decision_maker_access: 15
  budget_ability: 15
  proof_speed: 15
  delivery_simplicity: 10
  saudi_localization_advantage: 10

# Gate: do not enter a new sector unless ALL of these are true.
entry_gate:
  - "pain واضح وموثّق (call / Proof / اعتراض)"
  - "offer واضح من الكتالوج (offer_ref)"
  - "draft sequence جاهز (قالب القطاع)"
  - "proof angle محدد (أين التسرب)"
  - "delivery checklist بسيط (أول workflow)"

