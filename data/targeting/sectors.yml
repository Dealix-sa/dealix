# Dealix Market Intelligence & Targeting OS — قطاعات الاستهداف
# Phase 1 sectors are the founder-approved beachhead. `priority` drives query
# generation order and contributes to ICP-fit scoring. Keep this list small and
# governed — do not add sensitive sectors here (see blocked_sources.yml + the
# Governance OS RESEARCH_SOURCE_POLICY).
#
# id            : stable key used by scripts (lowercase, underscores)
# name_ar/en    : display labels for the daily brief
# phase         : 1 | 2 | 3  — rollout wave (see DAILY_RESEARCH_LOOP.md)
# priority      : 1 (highest) .. 5 — tie-breaker for ICP fit
# default_offer : Dealix OS angle this sector usually maps to
# keywords_ar   : Arabic discovery terms fed to the Query Factory

sectors:
  - id: b2b_consulting
    name_ar: "استشارات أعمال B2B"
    name_en: "B2B consulting"
    phase: 1
    priority: 1
    default_offer: "Command Sprint"
    keywords_ar: ["استشارات أعمال", "استشارات إدارية", "تطوير أعمال"]

  - id: training_companies
    name_ar: "شركات التدريب المؤسسي"
