services:
  dev:
    image: mcr.microsoft.com/devcontainers/python:1-3.12-bookworm
    container_name: dealix-dev
    working_dir: /workspace/dealix
    command: sleep infinity
    volumes:
      - .:/workspace/dealix:cached
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://ai_user:ai_password@pgbouncer:6432/ai_company
      REDIS_URL: redis://:${REDIS_PASSWORD:-dev_redis_secret}@redis:6379/0
    networks:
      - ai-company

networks:
  ai-company:
    external: false
