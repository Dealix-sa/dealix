services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: dealix-litellm
    env_file:
      - .env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    volumes:
      - ./.ai/litellm_config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=5)\nPY",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
