<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 256" role="img" aria-labelledby="title desc">
  <title id="title">Dealix monochrome lockup</title>
  <desc id="desc">Single-color (white) monochrome version of the horizontal lockup, for use on dark backgrounds or in single-ink reproduction.</desc>

  <!-- Icon (all white) -->
  <g transform="translate(16 16) scale(0.875)" fill="#FFFFFF" stroke="#FFFFFF">
    <path d="M 64 40 L 64 216 L 140 216 C 188 216 224 180 224 128 C 224 76 188 40 140 40 Z M 96 72 L 140 72 C 172 72 192 96 192 128 C 192 160 172 184 140 184 L 96 184 Z" stroke="none"/>
    <path d="M 200 200 A 86 86 0 1 1 56 88" fill="none" stroke-width="14" stroke-linecap="round"/>
    <rect x="106" y="160" width="14" height="32" rx="2" stroke="none"/>
    <rect x="128" y="140" width="14" height="52" rx="2" stroke="none"/>
    <rect x="150" y="116" width="14" height="76" rx="2" stroke="none"/>
    <polygon points="172,108 196,108 184,80" stroke="none"/>
    <rect x="180" y="108" width="8" height="34" rx="1" stroke="none"/>
  </g>

  <!-- Divider -->
  <rect x="252" y="48" width="2" height="160" fill="#FFFFFF" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="288" y="148"
        font-family="Sora, 'Space Grotesk', system-ui, sans-serif"
        font-weight="700"
        font-size="104"
        letter-spacing="10"
        fill="#FFFFFF">DEALIX</text>

  <!-- Tagline -->
  <text x="288" y="192"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="500"
        font-size="22"
        letter-spacing="4"
        fill="#FFFFFF">INTELLIGENT DEALS. REAL GROWTH.</text>
</svg>
