<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Dealix icon</title>
  <desc id="desc">Stylised letter D with ascending bar chart and upward arrow encircled by a teal arc.</desc>

  <defs>
    <linearGradient id="dGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B2BBC6"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"  stop-color="#00A37D"/>
      <stop offset="100%" stop-color="#00D1A1"/>
    </linearGradient>
  </defs>

  <!-- Letter D outline -->
  <path d="M 64 40 L 64 216 L 140 216 C 188 216 224 180 224 128 C 224 76 188 40 140 40 Z M 96 72 L 140 72 C 172 72 192 96 192 128 C 192 160 172 184 140 184 L 96 184 Z"
        fill="url(#dGrad)"/>

  <!-- Encircling arc (teal) -->
  <path d="M 200 200 A 86 86 0 1 1 56 88"
        fill="none" stroke="url(#arcGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- Ascending bars -->
  <rect x="106" y="160" width="14" height="32" fill="#00D1A1" rx="2"/>
  <rect x="128" y="140" width="14" height="52" fill="#00D1A1" rx="2"/>
  <rect x="150" y="116" width="14" height="76" fill="#00D1A1" rx="2"/>

  <!-- Upward arrow -->
  <polygon points="172,108 196,108 184,80" fill="#34E3B5"/>
  <rect x="180" y="108" width="8" height="34" fill="#34E3B5" rx="1"/>
</svg>
