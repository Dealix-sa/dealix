  <text x="792" y="300" text-anchor="middle" font-family="'Noto Sans Arabic', sans-serif" font-size="20" fill="#FFFFFF" opacity="0.75">ZATCA جاهز</text>
  <text x="1104" y="300" text-anchor="middle" font-family="'Noto Sans Arabic', sans-serif" font-size="20" fill="#FFFFFF" opacity="0.75">موافقة أولاً</text>

