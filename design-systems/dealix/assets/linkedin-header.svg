<svg width="1584" height="396" viewBox="0 0 1584 396" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dealix Navy -->
  <rect width="1584" height="396" fill="#001F3F"/>

  <!-- Subtle diamond grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="198" x2="1584" y2="198" stroke="#D4AF37" stroke-width="1"/>
    <line x1="792" y1="0" x2="792" y2="396" stroke="#D4AF37" stroke-width="1"/>
    <line x1="0" y1="0" x2="1584" y2="396" stroke="#D4AF37" stroke-width="0.5"/>
    <line x1="1584" y1="0" x2="0" y2="396" stroke="#D4AF37" stroke-width="0.5"/>
  </g>

  <!-- Diamond accent shape left -->
  <path d="M120 198 L198 120 L276 198 L198 276 Z" fill="#D4AF37" opacity="0.12"/>
  <path d="M120 198 L198 120 L276 198 L198 276 Z" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.4"/>

  <!-- Logo mark -->
  <rect x="148" y="158" width="100" height="100" rx="12" fill="#001F3F" stroke="#D4AF37" stroke-width="2" opacity="0.8"/>
  <text x="198" y="224" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="700" font-size="52" fill="#D4AF37">D</text>

  <!-- Main headline AR -->
  <text x="792" y="175" text-anchor="middle" font-family="'Noto Sans Arabic', Cairo, sans-serif" font-weight="700" font-size="52" fill="#FFFFFF" direction="rtl">
