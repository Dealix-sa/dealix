# Dealix Strategy Execution OS — strategy definition
# Draft-only. Level 5 (external execution) is blocked by the engine.
name: Technical Trust
goal: 'Keep production trustworthy: healthz green, config aligned, no secrets leaked.'
target_customer: Internal (production reliability underpins every sale).
priority: 1
inputs:
- railway.toml
- railway.json
- /healthz
- security smoke results
allowed_actions:
- analyze config
- draft reliability checklist
- build queue of fixes
blocked_actions:
- change production
- edit secrets
- disable security guard
steps:
- Analyze Railway config drift against repo canonical
- Prioritize any healthcheck or boot risks
- Draft a reliability checklist for the founder
outputs:
- reliability checklist
- config drift note
kpis:
- healthz uptime
- config-drift incidents
- zero committed secrets
approval_required_for:
- any production change
- any secret rotation
stop_conditions:
- A committed secret is found
- Production guard would need weakening
proof_required:
- healthz 200 response reference
learning_rule: Escalate reliability strategy priority after any boot failure.
safety_notes: Draft-only. No auto-send, no publish, no charge. Human approves before
  anything leaves.
max_autonomy_level: 3
