# Dealix Strategy Execution OS — strategy definition
# Draft-only. Level 5 (external execution) is blocked by the engine.
name: Content Factory
goal: Produce draft-only, value-led content with a soft CTA to request a Snapshot.
target_customer: Saudi B2B decision makers on LinkedIn/X/newsletter.
priority: 8
inputs:
- insight backlog
- offer ladder
allowed_actions:
- draft content
- build content queue
blocked_actions:
- publish social
- auto post
- fake proof
steps:
- Draft LinkedIn/X/newsletter content for the day
- Draft a one-page market insight lead magnet
- Build the content queue for founder review
outputs:
- content queue
kpis:
- snapshots requested from content
approval_required_for:
- publish
- post
stop_conditions:
- Any guaranteed claim or fake proof appears
proof_required:
- hypothesis language only (we expect / the goal is)
learning_rule: Repost formats that drove the most snapshot requests.
safety_notes: Draft-only. No auto-send, no publish, no charge. Human approves before
  anything leaves.
max_autonomy_level: 3
