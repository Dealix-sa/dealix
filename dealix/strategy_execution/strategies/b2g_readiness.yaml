# Dealix Strategy Execution OS — strategy definition
# Draft-only. Level 5 (external execution) is blocked by the engine.
name: B2G Readiness
goal: Prepare companies for B2G opportunities with compliant readiness checklists.
target_customer: Companies preparing for government / enterprise bids.
priority: 7
inputs:
- compliance requirements
- readiness template
allowed_actions:
- draft readiness checklist
- build queue
blocked_actions:
- claim government access
- claim special influence
steps:
- Draft a B2G readiness checklist
- Build a gap-closure queue
outputs:
- readiness checklist
- gap queue
kpis:
- readiness sprints sold
approval_required_for:
- send checklist
stop_conditions:
- Any special-influence or guaranteed-access claim
proof_required:
- published compliance requirement reference
learning_rule: Never imply influence; only readiness and compliance.
safety_notes: Draft-only. No auto-send, no publish, no charge. Human approves before
  anything leaves.
max_autonomy_level: 3
