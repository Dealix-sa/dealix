# Dealix Strategy Execution OS — strategy definition
# Draft-only. Level 5 (external execution) is blocked by the engine.
name: Foreign Company Targeting
goal: Identify and prepare high-signal outreach drafts for foreign firms.
target_customer: Foreign B2B firms exploring Saudi expansion.
priority: 5
inputs:
- target account list
- value map
allowed_actions:
- prioritize accounts
- draft outreach
- build queue
blocked_actions:
- scrape
- mass linkedin automation
- cold whatsapp blast
steps:
- Prioritize up to 10 foreign target accounts
- Draft a value-led message per account
- Build a manual follow-up plan
outputs:
- target list
- draft messages
- follow-up plan
kpis:
- replies
- calls booked
approval_required_for:
- send message
stop_conditions:
- Any scraping-prohibited source is requested
proof_required:
- opt-in or warm-intro reference before send
learning_rule: Prefer warm-intro paths over cold ones.
safety_notes: Draft-only. No auto-send, no publish, no charge. Human approves before
  anything leaves.
max_autonomy_level: 3
