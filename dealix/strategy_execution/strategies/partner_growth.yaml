# Dealix Strategy Execution OS — strategy definition
# Draft-only. Level 5 (external execution) is blocked by the engine.
name: Partner / Distributor Desk
goal: Draft partner and distributor intro paths (setup + success fee).
target_customer: Agencies, distributors, and channel partners.
priority: 10
inputs:
- partner list
- intro templates
allowed_actions:
- draft partner intro
- build queue
blocked_actions:
- send intro
- mass automation
steps:
- Prioritize potential partners
- Draft a partner intro message
outputs:
- partner intro drafts
kpis:
- partner intros made
- partner deals
approval_required_for:
- send intro
stop_conditions:
- Any mass-automation request
proof_required:
- mutual-interest reference before send
learning_rule: Prioritize partners with overlapping customer bases.
safety_notes: Draft-only. No auto-send, no publish, no charge. Human approves before
  anything leaves.
max_autonomy_level: 3
