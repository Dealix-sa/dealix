# ── Asset addition rules ──────────────────────────────────────────
addition_rules:
  - every_asset_traces_to: "code commit, proof_ledger event, OR public URL"
  - no_invented_assets: true
  - is_estimate_flag_required: "for any value not backed by confirmed source"
  - review_frequency: "weekly during Sunday ritual"
  - founder_only_can_add: true
