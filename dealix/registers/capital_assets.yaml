# Capital Asset Register — Dealix
#
# Tracks intangible + tangible assets the founder builds. Auditable.
# Updated by the founder weekly during the operating ritual (see
# docs/playbooks/FOUNDER_DAILY_RUNBOOK.md).
#
# Doctrine: every asset entry must trace to either a code commit, a
# proof_ledger event, or a public publication URL. No invented assets.
#
# Effective: 2026-06-01

meta:
  effective_date: "2026-06-01"
  last_reviewed: "2026-06-01"
  next_review: "2026-07-01"

# ── 1. Intellectual property ──────────────────────────────────────
intellectual_property:
  - id: doctrine_v1
    name_en: "The 11 non-negotiables doctrine"
    name_ar: "doctrine الـ ١١ خط أحمر"
    type: framework
    status: production
    location: docs/architecture/DOCTRINE_MANIFESTO.md
    enforced_in: tests/test_doctrine_guardrails.py
    public: true
    is_estimate: false

  - id: proof_ledger_v1
    name_en: "Proof ledger architecture"
    name_ar: "بنية proof ledger"
    type: technical_system
    status: production
    location: auto_client_acquisition/proof_ledger/
    public: true
    is_estimate: false

  - id: source_passport_v1
    name_en: "Source Passport schema for PDPL compliance"
    name_ar: "Source Passport — PDPL"
    type: technical_system
    status: production
    location: auto_client_acquisition/leadops_spine/
    public: true
    is_estimate: false

  - id: agent_fleet_v1
    name_en: "10-agent draft→approve→deliver fleet"
    name_ar: "أسطول الـ ١٠ agents"
    type: technical_system
    status: production
    location: auto_client_acquisition/agents/
    public: true
    is_estimate: false

  - id: founder_cockpit_v1
    name_en: "Unified founder cockpit (7-panel dashboard)"
    name_ar: "غرفة قيادة الفاوندر"
    type: technical_system
    status: production
    location: api/routers/founder_dashboard.py
    public: true
    is_estimate: false

