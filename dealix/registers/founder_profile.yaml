# ── Voice calibration ───────────────────────────────────────────
voice:
  # Used as a system-prompt constraint on every generated draft
  anchor: |
    Write as a Saudi founder speaking founder-to-founder. Direct,
    no fluff, no corporate-speak. Arabic primary, English fallback.
    Reference Saudi B2B reality (PDPL, ZATCA, sector context) but
    never perform "Saudi-ness." Every number cites a real source
    or carries is_estimate=true. No emojis. Short sentences. No
    fake guarantees. Doctrine #1-11 visible in commitments.

  # Hard rejection list — if a generated draft contains any of these,
  # auto-reject before queueing in approval_center
  anti_patterns_block_list:
    - "revolutionary"
    - "game-changing"
    - "synergy"
    - "synergize"
    - "leverage"
    - "best-in-class"
    - "cutting-edge"
    - "next-generation"
    - "ثوري"
    - "غير مسبوق"
    - "الأفضل في فئته"

  # Required closing lines — every draft must end with one of these
  signature_blocks:
    ar: |
      شكرًا،
      سامي
      Dealix · dealix.sa
    en: |
      Thanks,
      Sami
      Dealix · dealix.sa
    ar_short: "سامي"
    en_short: "Sami"

# ── Channel preference per prospect type ────────────────────────
channel_strategy:
  cold_first_contact:
    primary: linkedin_dm
    fallback: email
    forbidden: [whatsapp]  # Doctrine #2 — never cold WhatsApp
  warm_follow_up:
    primary: email
    secondary: whatsapp  # only if warm_consent_yes_no=true
  inbound_response:
    primary: same_channel_as_inquiry
    sla_minutes: 30  # business hours Sun-Thu 09:00-17:00 KSA

# ── Saudi-specific cultural markers ─────────────────────────────
cultural:
  greeting_ar_formal: "السلام عليكم"
  greeting_ar_casual: "أهلًا"
  greeting_en: "Hello"
  closing_ar: "شكرًا"
  closing_en: "Thanks"
  preferred_meeting_time_ksa: "09:00-12:00 OR 14:00-17:00 Sun-Thu"
  prayer_time_aware: true
  ramadan_aware: true
  friday_off: true  # avoid scheduling Fridays

