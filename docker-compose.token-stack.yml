# Token Reduction Stack — run alongside the main docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.token-stack.yml up
#
# Adds:
#   - litellm: AI gateway with caching, budgets, fallbacks (port 4000)
#   - redis-stack: Redis with vector search for semantic cache (port 6379)
#   - langfuse-worker: background event processor (if self-hosting Langfuse)

version: "3.9"

services:
  redis-stack:
    image: redis/redis-stack:latest
    container_name: dealix-redis-stack
    ports:
      - "6379:6379"
      - "8001:8001"   # RedisInsight UI
    volumes:
      - redis_stack_data:/data
    environment:
      - REDIS_ARGS=--maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: dealix-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - REDIS_HOST=redis-stack
      - REDIS_PORT=6379
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-dealix-dev-key}
      - LITELLM_DATABASE_URL=${LITELLM_DATABASE_URL:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "4"]
    depends_on:
      redis-stack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  redis_stack_data:
    driver: local

networks:
  default:
    name: dealix-token-stack
    external: false
