version: 1.0

whatsapp_first_touch: |
  السلام عليكم، أنا سامي من Dealix.

  عندي ملاحظة سريعة ممكن تكون مفيدة لـ {{company_name}}:
  كثير من الشركات تخسر فرص بسبب {{pain_angle}}.

  Dealix يبني نظام تشغيل ذكي للشركة يربط:
  العملاء + المتابعة + التقييمات + العروض + التقارير

  الفكرة ليست بوت فقط، بل Command Center يخلي الإدارة تعرف يومياً:
  كم فرصة دخلت؟
  مين يحتاج متابعة؟
  وين تضيع الفرص؟
  ما القرار المطلوب اليوم؟

  أقدر أرسل لك مثال مختصر على النظام المناسب لكم؟

whatsapp_followup_1: |
  أرسل لك التوضيح بشكل مختصر:

  ممكن نبدأ مع {{company_name}} بمسار واحد فقط خلال 7-14 يوم:
  lead → follow-up → booking/proposal → weekly report

  العرض المناسب كبداية:
  {{core_offer}}

  الهدف: تقليل ضياع الفرص ورفع وضوح الإدارة بدون تغيير كل شيء مرة واحدة.

whatsapp_followup_2: |
  آخر متابعة مني حتى لا أزعجك.

  إذا مناسب، نسوي تشخيص سريع يطلع لكم:
  1. أين تضيع الفرص؟
  2. ما المتابعات المتأخرة؟
  3. ما أول نظام يعطي أثر خلال 14 يوم؟

  أرسل لك نموذج تشخيص مختصر؟

email_subject: "فكرة نظام تشغيل ذكي لـ {{company_name}}"

email_body: |
  السلام عليكم،

  أنا سامي من Dealix.

  أرسل لك فكرة مختصرة لأن شركات كثيرة عندها فرص تضيع بسبب {{pain_angle}}.

  Dealix يبني أنظمة تشغيل ذكية للشركات:
  - Sales pipeline
  - WhatsApp follow-up
  - Review intelligence
  - Executive reports
  - Brand/content workflow
  - AI agents with approval gates

  أقترح نبدأ بتشخيص قصير لـ {{company_name}} ونحدد أول مسار ممكن يتحسن خلال 7-14 يوم.

  تحياتي،
  سامي
  Dealix

call_script: |
  هدف المكالمة: اكتشاف تسرب تشغيلي واضح وليس بيع كل شيء فوراً.

  الأسئلة:
  1. كم استفسار يدخل أسبوعياً؟
  2. وين تجي أغلب الاستفسارات؟
  3. مين يتابع؟
  4. هل تعرفون كم فرصة لم تتم متابعتها؟
  5. هل الإدارة عندها تقرير يومي/أسبوعي؟
  6. ما أكثر سبب خسارة فرصة؟
  7. لو نبدأ بمسار واحد، وش أهم مسار؟
