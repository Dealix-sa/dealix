# Dealix Persuasion Engine Configuration
# The intellectual core of the Draft Factory

persuasion_principles:
  - "Start with a company-specific observation — never a generic opener."
  - "Never open with generic AI claims (no 'AI is transforming...', no 'leverage AI...')."
  - "Mention one likely operational pain only — not a list of problems."
  - "Offer one low-risk next step — not a full product pitch."
  - "Use founder tone: direct, practical, not corporate fluff."
  - "Avoid fake certainty. Mark assumptions softly ('غالبًا', 'في مثل هذا النوع من العمل')."
  - "Never promise ROI without baseline data."
  - "Never pressure the recipient."
  - "Always include a soft opt-out line."
  - "Never mention more than one product per email."
  - "Length: 150-220 words for cold email. Never longer."

draft_formula:
  b2b_cold_email:
    sequence:
      - step: company_observation
        description: "One specific observation about this company's work/operations"
        examples:
          - "لاحظت أن طبيعة عمل [Company] مرتبطة بالتشغيل والصيانة..."
          - "بناءً على طبيعة مشاريع [Company] في قطاع المقاولات..."
        anti_patterns:
          - "نقدم أحدث حلول الذكاء الاصطناعي"
          - "كشركة رائدة في مجال التقنية"
          - "نود التعريف بخدماتنا"

      - step: likely_pain
        description: "One operational pain common to companies like them"
        examples:
          - "غالبًا في هذا النوع من التشغيل، التحدي لا يكون في وجود البيانات، بل في ربطها..."
          - "عادة في بيئات المشاريع المتعددة، المشكلة في تحويل التحديثات إلى قرار واضح..."
        anti_patterns:
          - "لديكم مشاكل كثيرة"
          - "نعرف أنكم تعانون من"

      - step: dealix_specific_solution
        description: "How Dealix specifically addresses THIS pain for THIS sector"
        examples:
          - "في Dealix نبني Agentic AI workflows تساعد فريق العمليات على..."
        anti_patterns:
          - "لدينا منصة شاملة"
          - "نقدم جميع خدمات الذكاء الاصطناعي"

      - step: solution_bullets
        description: "3-5 specific capabilities — not marketing speak"
        max_bullets: 5
        examples:
          - "تصنيف البلاغات تلقائياً"
          - "استخراج النقاط المهمة من تقارير الفنيين"
          - "كشف الأعطال المتكررة"

      - step: low_risk_offer
        description: "Entry offer — low commitment, clear value"
        default: "AI Workflow Audit خلال 7 أيام على workflow واحد"

      - step: simple_cta
        description: "One clear, easy action"
        examples:
          - "هل يناسبكم أرسل لكم one-page مختصر للفكرة؟"
          - "هل يناسبكم نحدد 20 دقيقة هذا الأسبوع؟"
        anti_patterns:
          - "انقر هنا للتسجيل"
          - "اشترك الآن"

      - step: soft_opt_out
        description: "Respectful exit offer — always required"
        template: "إذا ما كان هذا مناسب لكم، أقدر أوقف المتابعة."

quality_weights:
  personalization: 25
  relevance: 25
  clarity: 15
  commercial_value: 15
  credibility: 10
  compliance: 10

minimum_send_score: 82

tone_guidelines:
  founder_mode:
    suitable_for: ["large companies", "enterprise", "government"]
    characteristics:
      - Direct and strategic
      - "أنا أبني Dealix كنظام..."
      - Shows vision and domain expertise
      - Peer-to-peer tone with senior buyers

  builder_practical:
    suitable_for: ["medium companies", "growing SMBs"]
    characteristics:
      - Practical and outcome-focused
      - "أقدر أساعدكم في بناء pilot صغير..."
      - Shows execution capability
      - Less formal, more collaborative

  freelancer_quick_win:
    suitable_for: ["small companies", "budget-conscious"]
    characteristics:
      - Fast, low commitment framing
      - Focus on quick wins
      - "خلال أسبوع واحد نطلع بنتيجة واضحة"

persuasion_angles:
  pain_first:
    when: "company is operations-heavy with clear pain signals"
    opener: "operational pain observation"

  audit_first:
    when: "company sector is clear but pain is uncertain"
    opener: "workflow observation + audit offer"

  governance_first:
    when: "large enterprise or government entity"
    opener: "controlled AI adoption framing"

  founder_builder:
    when: "medium company, growth-stage"
    opener: "builder credibility + pilot framing"

  executive_value:
    when: "CEO or C-suite contact, holding company"
    opener: "executive visibility and decision speed"

ab_testing:
  max_variants_per_sector: 3
  tracking_fields:
    - angle
    - subject_type
    - cta_type
    - opener_type
  success_metrics:
    - reply_rate
    - positive_reply_rate
    - meeting_booked_rate
