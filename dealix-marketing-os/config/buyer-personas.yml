---
# Buyer persona profiles used by offer_router.py and draft_writer.py.
# Personas define how to frame messaging for each role type.

personas:
  - id: operations_director
    titles: [Operations Director, Director of Operations, VP Operations]
    primary_pain: operational overhead and unplanned costs
    decision_style: data-driven, risk-averse, needs proof of ROI
    preferred_cta: diagnostic session with their own data
    language_register: formal, outcome-focused, evidence-based
    avoid: feature lists, technical jargon without context

  - id: coo
    titles: [COO, Chief Operating Officer, Head of Operations]
    primary_pain: scaling without adding headcount, board reporting accuracy
    decision_style: strategic, seeks competitive differentiation
    preferred_cta: executive briefing or leadership workshop
    language_register: concise, strategic, peer-level
    avoid: tactical detail in initial outreach

  - id: founder_sme
    titles: [Founder, CEO, Managing Director, Owner]
    primary_pain: growth bottlenecks, time spent on operational firefighting
    decision_style: fast, intuition-led, price-sensitive in early stage
    preferred_cta: quick win demonstration
    language_register: direct, practical, minimal jargon
    avoid: enterprise-heavy language, long proof sequences

  - id: fm_manager
    titles: [FM Manager, Facilities Manager, Head of Facilities]
    primary_pain: reactive maintenance, SLA compliance, cost visibility
    decision_style: practical, process-oriented, compliance-conscious
    preferred_cta: side-by-side walkthrough of current vs. proposed workflow
    language_register: process-oriented, specific to FM terminology
    avoid: abstract ROI claims without operational grounding

  - id: logistics_manager
    titles: [Logistics Manager, Supply Chain Manager, Fleet Manager]
    primary_pain: delivery reliability, dispatcher workload, customer complaints
    decision_style: metrics-first, wants to see dashboards
    preferred_cta: live data visualisation demo
    language_register: metrics-heavy, operations terminology
    avoid: vague productivity language

  - id: bd_manager
    titles: [Business Development Manager, Sales Director, Head of Sales]
    primary_pain: pipeline stalls, manual follow-up, forecast inaccuracy
    decision_style: competitive, revenue-focused
    preferred_cta: pipeline comparison benchmark
    language_register: commercial, outcome-oriented
    avoid: technical implementation detail

outreach_tone:
  default: professional_peer
  gcc_formality: high
  opening_style: specific_observation_about_their_operations
  closing_style: low_commitment_ask
