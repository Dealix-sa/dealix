      - "Knowledge management — precedents and templates scattered"
      - "Compliance documentation takes excessive time"
    proof_points:
      - "Law firms using AI review tools cut document processing time by 60-80%"
      - "Saudi Vision 2030 digital transformation requirements create urgency"
    pricing_entry:
      offer: "ai_workflow_audit"
      sar_min: 5000
      sar_max: 15000
    pricing_retainer:
      offer: "ai_ops_retainer"
      sar_monthly_min: 8000
      sar_monthly_max: 25000
    preferred_channel: "Email"
    best_offer: "sovereign_knowledge_rag"
    best_buyer_title: "Managing Partner"
    objections:
      - "Client confidentiality concerns"
      - "Bar association regulations"
    objection_responses:
      "Client confidentiality concerns": >
        نظامنا يعمل على بنيتكم التحتية — البيانات لا تغادر خوادمكم.
        لا تدريب على بياناتكم. audit log كامل.
      "Bar association regulations": >
        نراجع معكم متطلبات هيئة المحامين السعودية قبل البدء.
        نظام AI يساعد المحامي ولا يستبدله.

