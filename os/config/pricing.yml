# =====================================================================
# PRICE LADDER — النسخة المختصرة المعتمدة
# =====================================================================
price_ladder:
  - { step: "Diagnostic Report", price: 0 }
  - { step: "AI Workflow Audit", price: 9500 }
  - { step: "Regulated Audit", price: 15000 }
  - { step: "Pilot Lite", price: 30000 }
  - { step: "Pilot Pro", price: 60000 }
  - { step: "Multi-System Pilot", price: 100000 }
  - { step: "Production OS", price_min: 150000, price_max: 300000 }
  - { step: "Command Center", price_min: 300000, price_max: 500000 }
  - { step: "Managed OS Monthly", price: 15000 }
  - { step: "Growth/Ops Monthly", price: 25000 }
  - { step: "Enterprise Monthly", price_min: 45000, price_max: 100000 }

