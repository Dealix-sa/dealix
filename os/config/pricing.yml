# المنتج الذي يُباع دائمًا
default_anchor_offer:
  monthly: "managed_os"     # 15,000 SAR/mo — راجع packages.yml
  pilot: "pilot_pro_api"    # 60,000 SAR
  entry: "ai_workflow_audit" # 9,500 SAR

# خطة رفع الأسعار في الشهر الثالث
planned_price_increase_month_3:
  ai_workflow_audit: { from: 9500, to: 12000 }
  pilot_pro_api: { from: 60000, to: 75000 }
  managed_os_monthly: { from: 15000, to: 18000 }
  command_center_setup: { from: 300000, to: 400000 }
