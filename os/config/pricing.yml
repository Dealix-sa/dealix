# Dealix Pricing — Single Source of Truth
# كتاب الأسعار المعتمد — المصدر الوحيد للحقيقة
#
# القاعدة: لا يوجد سعر يُشارك مع عميل إلا من هذا الملف، وليس من الذاكرة.
# Rule: No price is shared with a client except from this file — never from memory.
#
# نموذج التسعير: Audit -> Pilot -> Production -> Monthly OS -> Usage/Add-ons -> Command Center
# Pricing model: every offer carries up to 4 layers:
#   setup_fee     -> أصل نقدي سريع   (fast cash)
#   monthly_os    -> اشتراك متكرر    (MRR)
#   usage_fee     -> استخدام زائد     (auto-growth with the client)
#   expansion_fee -> توسعة            (continuous upsell)
#
# جميع الأسعار قبل ضريبة القيمة المضافة. راجع كتلة vat أدناه.
# All prices exclusive of VAT — see the vat block below.

version: "1.0"
status: "approved"
effective_date: "2026-06-07"
owner: "founder"
currency: "SAR"
price_basis: "exclusive_of_vat"

vat:
  enabled: true
  rate: 0.15
  authority: "ZATCA"
  note: "Prices are exclusive of 15% VAT unless stated otherwise. الأسعار غير شاملة لضريبة القيمة المضافة 15% ما لم يُذكر خلاف ذلك."

# مشاركة أي سعر مع عميل تتطلب موافقة المؤسس (راجع os/06_APPROVAL_GATES.yml — G03)
# Sharing any price with a client requires founder approval (see G03).
approval_gate: "G03_share_pricing"

# =====================================================================
# 0) DIAGNOSTIC — تقرير أولي مجاني (بوابة فقط، ليس مصدر ربح)
# =====================================================================
diagnostic:
  free_one_pager:
    name_en: "Free Diagnostic One-Pager"
    name_ar: "تقرير تشخيصي أولي من صفحة واحدة"
    price: 0
    duration_days: 1
    purpose: "lead_qualification_only"
    note: "بوابة دخول فقط. التدقيق الحقيقي مدفوع. Gateway only — the real audit is paid."

# =====================================================================
# A) ENTRY OFFERS — عروض الدخول (بوابة إلى Pilot ثم اشتراك شهري)
# =====================================================================
entry_offers:
  ai_workflow_audit:
    name_en: "AI Workflow Audit"
    name_ar: "تدقيق الـ Workflow بالذكاء الاصطناعي"
    price: 9500
    duration_days: 5
    goal: "كشف الفوضى والفرص"
    deliverables:
      - workflow_map
      - pain_points_map
      - ai_opportunity_map
      - pilot_scope
      - next_step_proposal
    upgrade_credit:
      enabled: true
      credit_percent: 50
      valid_days: 14
      note: "خصم 50% من قيمة الـ Audit عند الترقية إلى Pilot خلال 14 يوم."
    natural_next_offer: "pilot_pro_api"

  revenue_leak_audit:
    name_en: "Revenue Leak Audit"
    name_ar: "تدقيق تسرّب الإيراد"
    price: 12000
    duration_days: 5
    goal: "كشف ضياع العملاء والمتابعة"
    upgrade_credit: { enabled: true, credit_percent: 50, valid_days: 14 }
    natural_next_offer: "growth_pilot"

  regulated_audit:
    name_en: "Legal / Regulated Audit"
    name_ar: "تدقيق القطاعات الحساسة"
    price: 15000
    duration_days: 7
    goal: "للقطاعات الحساسة (قانوني/صحي/مالي/بيانات حساسة)"
    natural_next_offer: "regulated_pilot"

  executive_ai_readiness:
    name_en: "Executive AI Readiness Pack"
    name_ar: "حزمة جاهزية الذكاء الاصطناعي التنفيذية"
    price: 18000
    duration_days: 10
    goal: "تقرير CEO + Roadmap"
    natural_next_offer: "executive_pilot"

  full_department_audit:
    name_en: "Full Department Audit"
    name_ar: "تدقيق قسم كامل"
    price: 25000
    duration_days_min: 10
    duration_days_max: 14
    goal: "لقسم كامل: مبيعات/عمليات/صيانة/قانوني"
    natural_next_offer: "multi_system_pilot"

# اختبار A/B لعرض الدخل (يحل محل تجربة entry_offer_pricing القديمة)
# Entry offer experiment — replaces legacy free/5000 variants.
entry_offer_experiment:
  variant_a:
    label: "تقرير أولي مجاني من صفحة واحدة"
    ref: "diagnostic.free_one_pager"
  variant_b:
    label: "Audit مدفوع 9,500 ريال"
    ref: "entry_offers.ai_workflow_audit"
  variant_c:
    label: "Audit مدفوع مع خصم 50% عند الترقية إلى Pilot"
    ref: "entry_offers.ai_workflow_audit"
    note: "نفس Audit B مع تفعيل upgrade_credit."

# =====================================================================
# B) PILOT OFFERS — المرحلة الذهبية للإغلاق
# =====================================================================
pilots:
  pilot_lite_no_api:
    name_en: "Pilot Lite — No API"
    name_ar: "تجربة خفيفة بدون API"
    price: 30000
    duration_days_min: 21
    duration_days_max: 30
    best_for: "ملفات Excel/CSV/Google Sheets"
    includes:
      - one_workflow
      - csv_or_excel_input
      - basic_dashboard
      - weekly_report
      - production_proposal

  pilot_pro_api:
    name_en: "Pilot Pro — With API"
    name_ar: "تجربة احترافية مع API"
    price: 60000
    duration_days: 30
    best_for: "نظام موجود أو CRM أو API"
    includes:
      - one_workflow
      - one_api_or_system
      - dashboard
      - before_after_report
      - approval_checkpoint
      - production_proposal
      - monthly_retainer_contract

  multi_system_pilot:
    name_en: "Multi-System Pilot"
    name_ar: "تجربة متعددة الأنظمة"
    price: 100000
    duration_days: 45
    best_for: "أكثر من نظام أو قسم"
    includes:
      - up_to_three_workflows
      - up_to_two_systems
      - executive_report
      - production_proposal

  regulated_pilot:
    name_en: "Regulated Pilot"
    name_ar: "تجربة القطاعات الحساسة"
    price_min: 75000
    price_max: 120000
    duration_days: 45
    best_for: "قانوني/صحي/مالي/بيانات حساسة"
    requires:
      - human_approval
      - audit_log
      - access_control
      - data_handling_policy

  executive_pilot:
    name_en: "Executive Pilot"
    name_ar: "التجربة التنفيذية"
    price: 150000
    duration_days: 60
    best_for: "CEO dashboard + أكثر من workflow"

  growth_pilot:
    name_en: "Growth Pilot"
    name_ar: "تجربة النمو / Outbound"
    price_min: 45000
    price_max: 60000
    duration_days: 30
    best_for: "B2B sales teams (controlled outbound only)"
    note: "Controlled outbound مع موافقات وحدود إرسال — ليس spam engine."

# قاعدة صارمة: أي Pilot لا ينتهي بعرض Production + Retainer يعتبر ناقص.
# Hard rule: any pilot that does not end with a Production + Retainer proposal is incomplete.
pilot_exit_required_outputs:
  - working_workflow
  - dashboard
  - before_after_report
  - risk_compliance_notes
  - production_proposal
  - monthly_retainer_contract

