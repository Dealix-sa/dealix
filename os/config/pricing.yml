# ---------------------------------------------------------------------------
# الخصومات المسموحة — Discounts (لا تعطِ خصومات كبيرة)
# ---------------------------------------------------------------------------
discounts:
  annual_prepay: 0.10            # 10% للدفع السنوي فقط
  first_3_case_study: 0.15       # 15% لأول 3 عملاء مقابل Case Study
  pilot_to_production_credit: 0.50  # خصم 50% من قيمة الـ Audit عند الانتقال خلال 14 يوم
  usage_overage: 0.0             # لا خصم على الاستخدام الزائد إطلاقًا

# ---------------------------------------------------------------------------
# شروط الدفع — Payment Terms
# ---------------------------------------------------------------------------
payment_terms:
  project_milestones:
    - { name_ar: "عند التوقيع", name_en: "On signing", pct: 0.50 }
    - { name_ar: "بعد تسليم MVP/Pilot", name_en: "After MVP/Pilot", pct: 0.30 }
    - { name_ar: "عند الإطلاق", name_en: "On launch", pct: 0.20 }
  subscription:
    min_term_months: 6
    preferred_term_months: 12
    billing: "monthly_in_advance"
    annual_prepay_discount: 0.10
    early_cancel_penalty_months: 2
    out_of_scope_support_hourly_sar_min: 500
    out_of_scope_support_hourly_sar_max: 800

# ---------------------------------------------------------------------------
# حماية الهامش — Margin Floors (تُفحص في scripts/calculate_margin.py)
# ---------------------------------------------------------------------------
margins:
  gross_margin_project_min: 0.55
  gross_margin_subscription_min: 0.65
  net_margin_target_min: 0.25
  pilot_discount_max: 0.20
  retainer_floor_sar: 8000
  production_floor_sar: 150000
  consulting_hour_floor_sar: 500

# ---------------------------------------------------------------------------
# القرار النهائي — السلم المعتمد (section 13)
