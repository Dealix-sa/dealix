# Dealix Pricing OS — v2.0
# مصدر الحقيقة الوحيد لأسعار المسار عالي اللمسة (high-touch services).
#
# هذا الملف يُكمّل ولا يستبدل:
#   - os/03_OFFERS.yml  ............ كتالوج العروض الوصفي (high-touch)
#   - auto_client_acquisition/service_catalog/registry.py  ... سلم المنتجات
#     منخفض التذكرة (499/1500/2999/7500) الذي يغذّي checkout عبر Moyasar.
#
# قاعدة تجارية: لا تُباع Dealix كمشروع تطوير مرة واحدة. النموذج الصحيح =
#   رسوم تأسيس (Setup) + اشتراك شهري (Monthly) + استخدام/توسعة (Usage) + أداء عند الإمكان.
#
# كل الأسعار أدناه قبل ضريبة القيمة المضافة (ex-VAT). تُضاف الضريبة حسب أنظمة ZATCA.

meta:
  version: "2.0"
  currency: "SAR"
  source_of_truth: true
  last_review: "2026-06-07"
  notes:
    - "كل الأسعار قبل ضريبة القيمة المضافة (ex-VAT)."
    - "فواتير المسار عالي اللمسة تُصدر يدويًا عبر عقد + فاتورة ZATCA، وليست auto-charge عبر Moyasar."

# ---------------------------------------------------------------------------
# الحوكمة والضوابط — تُفحص بواسطة tests/test_dealix_pricing_os.py
# ---------------------------------------------------------------------------
governance:
  prices_exclude_vat: true
  vat_rate: 0.15
  is_estimate: true                       # الأسعار تقديرية حتى توقيع العرض
  share_price_requires_founder_approval: true   # بوابة os/01_CLAUDE.md (مشاركة أي سعر)
  invoicing: "manual_contract_zatca"      # ليست auto-charge؛ لا تتعارض مع سقف Moyasar
  # نفس hard_gates الدستورية المستخدمة في service_catalog/registry.py
  hard_gates:
    - no_live_send
    - no_live_charge
    - no_cold_whatsapp
    - no_linkedin_auto
    - no_scraping
    - no_fake_proof
    - no_fake_revenue
    - no_blast

# ---------------------------------------------------------------------------
