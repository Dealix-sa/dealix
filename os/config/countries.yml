# Dealix — Country Configuration
# بلدان العمليات والأولويات

version: "1.0"

countries:

  ksa:
    name: "Saudi Arabia"
    name_ar: "المملكة العربية السعودية"
    code: "SA"
    currency: "SAR"
    priority: 1
    languages:
      primary: "ar"
      secondary: "en"
    channels:
      allowed:
        - email
        - website_form
        - phone_intro
        - referral
        - linkedin_assisted
        - partner_referral
      blocked:
        - cold_whatsapp
        - linkedin_automation
        - scraping
    timezone: "Asia/Riyadh"
    working_days: ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday"]
    best_contact_hours: "09:00-12:00 and 15:00-17:00"
    notes: >
      Primary market. Arabic-first communication. Formal tone required.
      Vision 2030 context resonates strongly. PDPL compliance mandatory.
    active: true

