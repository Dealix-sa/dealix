# Dealix Usage Meters — v2.0
# تسعير الاستخدام: الدخل يزيد بدون شغل كبير. كل الأسعار قبل ضريبة القيمة المضافة.
#
# المبدأ (Stripe usage-based best practice): المقياس واضح، قابل للقياس، ويزيد
#   مع قيمة استخدام العميل. الباقة تعطي حدًّا (allowance)؛ الزائد يُحاسَب per block.
#
# مثال: Managed OS = 15,000/شهر ويشمل 3,000 عملية. كل 1,000 عملية إضافية = 2,500.

meta:
  version: "2.0"
  currency: "SAR"
  prices_exclude_vat: true
  rule_ar: "الباقة تعطي حد استخدام. أي استخدام زائد يُحاسَب عليه. لا خصم على التجاوز."

meters:
  operations:
    name_ar: "العمليات الشهرية (عام)"
    name_en: "Monthly operations (generic)"
    unit: "operation"
    block_size: 1000
    overage_per_block_sar_min: 1500
    overage_per_block_sar_max: 3000
    overage_per_block_sar_typical: 2500

  maintenance_tickets:
    name_ar: "تذاكر الصيانة"
