# Dealix — Sector Configuration
# قطاعات العمل والتوجيه

version: "1.0"

sectors:

  legal:
    name: "Legal Services"
    name_ar: "الخدمات القانونية"
    slug: "legal"
    sensitive: true
    buyer_titles:
      - "Managing Partner"
      - "Senior Partner"
      - "Head of Legal Operations"
      - "Chief Legal Officer"
      - "Legal Operations Manager"
    pains:
      - "Document retrieval takes hours"
      - "Matter summaries written manually"
      - "Confidentiality risks with shared files"
      - "Junior staff can't find precedents"
      - "Billing time lost to admin tasks"
    primary_offer: "legal_knowledge_document_os"
    entry_offer: "ai_workflow_audit"
    channels:
      preferred:
        - referral
        - email
        - website_form
      avoid:
        - cold_whatsapp
        - linkedin_automation
        - phone_intro_cold
    tone: "formal_arabic_conservative"
    trust_signals:
      - "Data never leaves your environment"
      - "Full audit log of every access"
      - "PDPL compliant"
      - "Human approval before any external action"
    approx_deal_size_sar: "50,000–250,000"
    notes: >
      Highly sensitive sector. Confidentiality is the #1 concern.
      Approach through referral or formal email only. Never cold WhatsApp.
      Emphasize sovereignty and data control in all communications.

