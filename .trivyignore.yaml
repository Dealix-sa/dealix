secrets:
  # False-positive: these lines are grep -v exclusion patterns used in secret-scan
  # verification scripts, not actual credentials. The strings sk_live_xxxxx /
  # sk_live_test / EXAMPLE are placeholder tokens intentionally listed as safe
  # exclusions in the grep pattern, not real Stripe keys.
  - id: stripe-secret-token
    paths:
      - scripts/v10_master_verify.sh
      - scripts/v7_launch_verify.sh
    statement: "false positive — exclusion patterns in grep -v commands, not real keys"

