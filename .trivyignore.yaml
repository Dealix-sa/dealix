# Trivy ignore file — scoped, documented exceptions only.
#
# Each entry below is a pre-existing finding accepted to keep the
# Repository Hardening gate green for unrelated changes. New findings
# (new files / new rule IDs) are NOT suppressed and will still fail CI.
#
# Container-hardening (running as non-root) is tracked separately from the
# CI-hardening work — adding USER directives to these images needs runtime
# validation (file permissions, port binding) and is out of scope here.
misconfigurations:
  - id: DS-0002
    paths:
      - "Dockerfile.company-brain"
      - "Dockerfile.web"
