# Objection Engine — classify → draft → sales_asset → content_asset → FAQ
# Workflow: objection_received → classify → response_draft → sales_asset → content_asset → faq_update

version: "1.1"
updated: "2026-05-24"
changelog:
  - "1.1 (2026-05-24): added 5 PDPL enforcement objections (pdpl_compliance_cost, pdpl_dpo_required, pdpl_ndgp_registration, pdpl_whatsapp_consent, pdpl_consent_explicit_vs_implied)"
  - "1.0 (2026-05-17): initial 6 objections"

evidence_levels:
  L1: "direct citation of PDPL article or executive regulation"
  L2: "general PDPL principle or SDAIA public guidance — no specific article loaded"
  L3: "SDAIA enforcement precedent reported publicly (no case number disclosed)"
  L4: "Dealix internal interpretation pending lawyer review"

objections:
