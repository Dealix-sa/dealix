name: Claude Code

# Responds to @claude mentions in issues / PRs and reviews opened PRs.
# Secrets required (Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY  — Anthropic / Claude API key
# Optional (only if using a custom GitHub App instead of the default token):
#   APP_ID, APP_PRIVATE_KEY

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

# Avoid stacking redundant runs on the same PR/issue thread.
concurrency:
  group: claude-code-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Run only on explicit @claude mentions, or automatically on PRs.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 10
