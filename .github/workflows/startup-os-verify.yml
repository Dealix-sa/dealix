name: Startup OS Verify

# Verifies the full Dealix Startup Operating System: draft factory, safety,
# readiness, media/social, site, CRM, API, secrets, launch control, and the
# master verifier. Read-only / artifact-only. No external sending. No secrets.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate + verify Startup OS
        run: |
          python scripts/commercial_generate_400_drafts.py --target 400
          python scripts/commercial_safety_audit.py
          python scripts/commercial_launch_readiness.py --regenerate
          python scripts/media_social_calendar_generate.py
          python scripts/media_social_verify.py
          python scripts/site_launch_static_check.py
          python scripts/commercial_crm_schema_verify.py
          python scripts/api_commercial_static_check.py
          python scripts/final_secret_and_risk_scan.py --strict
          python scripts/final_launch_control_verify.py
          python scripts/startup_os_verify.py
      - name: Run Startup OS tests
        run: |
          python -m pip install --upgrade pip pytest >/dev/null
          python -m pytest -q -p no:cacheprovider \
            tests/test_commercial_generate_400_drafts.py \
            tests/test_commercial_safety_audit.py \
            tests/test_commercial_launch_readiness.py \
            tests/test_commercial_no_external_send.py \
            tests/test_commercial_quality_gate.py \
            tests/test_commercial_compliance_gate.py \
            tests/test_commercial_outputs_schema.py \
            tests/test_commercial_founder_review_report.py \
            tests/test_commercial_seed_leads_validate.py \
            tests/test_media_social_os.py \
            tests/test_site_launch_static_check.py \
            tests/test_crm_schema_verify.py \
            tests/test_api_commercial_static_check.py \
            tests/test_final_secret_and_risk_scan.py \
            tests/test_final_launch_control_verify.py \
            tests/test_startup_os_verify.py
      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startup-os-verification
          path: |
            outputs/startup_os/
            outputs/commercial_launch/
          retention-days: 14
