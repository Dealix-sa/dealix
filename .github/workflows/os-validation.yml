name: OS Config Validation

on:
  push:
    paths:
      - 'os/**'
      - 'scripts/validate_os_configs.py'
      - 'tests/test_os_yaml_parse.py'
      - 'tests/test_os_schema_examples.py'
      - '.github/workflows/os-validation.yml'
  pull_request:
    paths:
      - 'os/**'
      - 'scripts/validate_os_configs.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-os-configs:
    name: Validate OS configs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Run OS config validator
        run: python scripts/validate_os_configs.py

      - name: Run OS YAML parse tests
        run: |
          pip install pytest
          pytest tests/test_os_yaml_parse.py tests/test_os_schema_examples.py -v
