name: Dealix Sovereign Operating Stack

on:
  push:
    branches:
      - "**"
    paths:
      - "registries/**"
      - "policies/**"
      - "evals/gates/**"
      - "api/internal/**"
      - "api/routers/internal/**"
      - "scripts/verify_policy_as_code.py"
      - "scripts/verify_agent_registry.py"
      - "scripts/verify_eval_gate.py"
      - "scripts/verify_prompt_output_quality.py"
      - "scripts/verify_ultimate_operating_layer.py"
      - "scripts/verify_sovereign_operating_stack.py"
      - "scripts/smoke_internal_api.py"
      - ".github/workflows/dealix-sovereign-operating-stack.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal Python deps for smoke tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pyyaml httpx

      - name: Policy-as-code
        run: python scripts/verify_policy_as_code.py

      - name: Agent registry
        run: python scripts/verify_agent_registry.py

      - name: Eval gate
        run: |
          python scripts/verify_eval_gate.py
          python scripts/verify_prompt_output_quality.py

      - name: Ultimate operating layer
        run: python scripts/verify_ultimate_operating_layer.py

      - name: Sovereign operating stack (18 layers)
        run: python scripts/verify_sovereign_operating_stack.py

      - name: Smoke test internal founder-console API
        run: python scripts/smoke_internal_api.py
