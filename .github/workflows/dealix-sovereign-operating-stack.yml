name: dealix-sovereign-operating-stack

on:
  push:
    branches:
      - claude/dealix-sovereign-operating-stack-OFKms
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Verify Sovereign Operating Stack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML (best effort)
        run: python -m pip install --upgrade pip pyyaml || true

      - name: Policy-as-code verifier
        run: python scripts/verify_policy_as_code.py

      - name: Agent registry verifier
        run: python scripts/verify_agent_registry.py

      - name: Eval gate verifier
        run: python scripts/verify_eval_gate.py

      - name: Prompt/output safety verifier
        run: python scripts/verify_prompt_output_quality.py

      - name: Ultimate operating layer verifier
        run: python scripts/verify_ultimate_operating_layer.py

      - name: Sovereign operating stack verifier
        run: python scripts/verify_sovereign_operating_stack.py

  frontend-build:
    name: Build Founder Console
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check apps/web exists
        run: |
          if [ ! -d apps/web ]; then
            echo "::error::apps/web directory is missing"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build
