name: dealix-sovereign-operating-stack

on:
  schedule:
    - cron: "17 6 * * 1"
  pull_request:

permissions:
  contents: read

jobs:
  sovereign-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verifier dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Verify sovereign operating stack
        run: make sovereign-operating-stack
