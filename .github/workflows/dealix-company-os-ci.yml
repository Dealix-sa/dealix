name: Dealix Company OS CI

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/verify_*.py"
      - "execution_engine/**"
      - "dealix_cli/**"
      - "internal_dashboard/**"
      - "dashboard_data/**"
      - "ops_runtime/**"
      - "tests/fixtures/private_ops/**"
      - ".github/workflows/dealix-company-os-ci.yml"
  pull_request:
    paths:
      - "docs/**"
      - "scripts/verify_*.py"
      - "execution_engine/**"
      - "dealix_cli/**"
      - "internal_dashboard/**"
      - "dashboard_data/**"
      - "ops_runtime/**"
      - "tests/fixtures/private_ops/**"
      - ".github/workflows/dealix-company-os-ci.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: python -m pip install --upgrade pip pyyaml
      - name: Run full verify orchestrator
        run: python scripts/verify_full_ops.py
