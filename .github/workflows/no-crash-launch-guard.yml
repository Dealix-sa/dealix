name: No-Crash Launch Guard

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - feat/real-leads-engine

concurrency:
  group: no-crash-launch-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install -e .; fi

      - name: Compile
        run: python -m compileall -q api dealix scripts tests

      - name: Ruff
        shell: bash
        run: |
          set -o pipefail
          mkdir -p reports/ci
          ruff check api dealix scripts tests 2>&1 | tee reports/ci/no-crash-ruff.log

      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: no-crash-ruff-diagnostics
          path: reports/ci/no-crash-ruff.log
          if-no-files-found: warn

      - name: Commercial digest
        run: pytest -q tests/test_founder_commercial_digest.py

      - name: Business NOW
        run: bash scripts/run_business_now.sh

      - name: Commercial launch ready
        run: python3 scripts/verify_commercial_launch_ready.py

      - name: Founder go-live
        run: bash scripts/founder_go_live_verify.sh
