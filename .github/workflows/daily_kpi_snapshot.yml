name: Daily KPI Snapshot

# Persists a daily JSON snapshot of MRR / pipeline / trust / fleet KPIs.
# Output goes to data/kpi_snapshots/YYYY-MM-DD.json (gitignored). The
# /api/v1/metrics/kpi/today endpoint reads the latest snapshot.
#
# Doctrine: read-only. Composes existing modules. No external send.

on:
  schedule:
    - cron: "30 4 * * *"  # 04:30 UTC ≈ 07:30 KSA
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kpi-snapshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  snapshot:
    name: Write KPI snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimum deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install pydantic structlog httpx tenacity

      - name: Compute + persist snapshot
        env:
          APP_ENV: production
        run: python -m auto_client_acquisition.payment_ops.kpi_snapshot

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: kpi-snapshot-${{ github.run_number }}
          path: data/kpi_snapshots/
          retention-days: 30
