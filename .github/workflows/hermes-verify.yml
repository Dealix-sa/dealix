name: Hermes Verify

on:
  pull_request:
    paths:
      - 'hermes/**'
      - 'docs/hermes/**'
      - 'scripts/verify_hermes_layer.py'
      - 'scripts/hermes_review_runner.py'
      - '.github/workflows/hermes-verify.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hermes-verify:
    name: Hermes manifest and review artifact checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Hermes layer
        run: python scripts/verify_hermes_layer.py

      - name: Generate review-only artifacts
        run: python scripts/hermes_review_runner.py --out-dir /tmp/hermes-artifacts

      - name: Show artifact summary
        run: |
          test -s /tmp/hermes-artifacts/review_records.jsonl
          test -s /tmp/hermes-artifacts/founder_digest.md
          head -n 20 /tmp/hermes-artifacts/founder_digest.md
