name: Dealix Company OS v3 Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  company-os-v3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify Company OS v3
        run: python scripts/verify_company_os_v3.py
      - name: Compile
        run: python -m compileall scripts
