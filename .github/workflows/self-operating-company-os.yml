name: self-operating-company-os

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: self-operating-company-os-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-self-operating-company-os:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run self-operating company OS in draft-only mode
        run: |
          python scripts/commercial/run_self_operating_company_os.py --mode draft-only --limit 50

      - name: Upload generated operating artifacts
        uses: actions/upload-artifact@v7
        with:
          name: self-operating-company-os-report
          path: reports/self_operating_company_os/
          if-no-files-found: error
