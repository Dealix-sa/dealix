name: Agent Security Gate

# Runs whenever workflows or agent/MCP configuration change. Blocks the
# agentic-CI attack surface: untrusted issue/PR/comment text flowing into
# run/with/env steps, write-all permissions, and pull_request_target checkouts
# of untrusted head code. Least-privilege.

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".claude/**"
      - ".codex/**"
      - ".cursor/**"
      - "mcp_server/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan workflows + agent configs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Agent security gate (workflows)
        run: python scripts/agent_security_gate.py

      - name: Gate scanner self-test
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/test_agent_security_gate.py -q --no-cov
