name: Full Repo Test Matrix

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/ops/run_full_repo_test_matrix.sh"
      - "docs/ops/FULL_REPO_TEST_MATRIX.md"
      - ".github/workflows/full-repo-test-matrix.yml"
      - "api/**"
      - "app/**"
      - "core/**"
      - "db/**"
      - "dealix/**"
      - "scripts/**"
      - "tests/**"
      - "apps/web/**"
      - "pyproject.toml"
      - "Makefile"

permissions:
  contents: read

jobs:
  full-repo-test-matrix:
    name: Full repo test matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      APP_ENV: test
      ENVIRONMENT: test
      PYTHONIOENCODING: utf-8
      EXTERNAL_SEND_ENABLED: "false"
      EMAIL_SEND_ENABLED: "false"
      WHATSAPP_SEND_ENABLED: "false"
      WHATSAPP_ALLOW_LIVE_SEND: "false"
      SMS_SEND_ENABLED: "false"
      OUTBOUND_MODE: draft_only
      TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Run full repo test matrix
        run: bash scripts/ops/run_full_repo_test_matrix.sh

      - name: Upload matrix reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: full-repo-test-matrix
          path: reports/runtime/full_repo_test_matrix/
