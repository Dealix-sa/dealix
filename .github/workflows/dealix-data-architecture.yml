name: Dealix Data Architecture Checks
on:
  pull_request:
  push:
    branches: [main]

jobs:
  data-architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify data architecture
        run: python scripts/verify_company_data_architecture.py
