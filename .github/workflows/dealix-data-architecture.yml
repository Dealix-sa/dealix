name: Dealix Data Architecture Checks
on:
  pull_request:
  push:
    branches: [main]
jobs:
  data-architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify company data architecture
        run: python scripts/verify_company_data_architecture.py
      - name: Verify public data boundary
        run: python scripts/verify_data_boundary.py
      - name: Compile
        run: python -m compileall ops_runtime scripts dealix_cli
