name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks (PR commits only)
        # Scan only the commits introduced by this PR so pre-existing
        # historical findings do not block new work. Full-history remediation
        # is tracked separately.
        run: |
          BASE=$(git merge-base HEAD origin/main 2>/dev/null || git rev-parse HEAD^)
          gitleaks detect --source . --log-opts="${BASE}..HEAD" --redact --no-banner

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy filesystem scan
        # Hard gate (exit-code 1): any NEW CRITICAL/HIGH vuln blocks the build.
        # --scanners vuln: secret scanning is owned by Gitleaks above; Trivy's
        #   secret detector only produced false positives on the repo's own
        #   grep-based secret-scan scripts (sk_live_… detection patterns).
        # --ignorefile .trivyignore: explicit allowlist of PRE-EXISTING Next.js
        #   findings only; remediation (bump next>=15.5.16) is tracked there.
        run: |
          trivy fs . \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --exit-code 1
