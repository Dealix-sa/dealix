name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Use the open-source Gitleaks CLI directly. The gitleaks-action@v2
      # wrapper requires a paid GITLEAKS_LICENSE secret for GitHub orgs;
      # the CLI itself is free and honours the repo .gitleaks.toml allowlist.
      - name: Run Gitleaks (open-source CLI)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          chmod +x /tmp/gitleaks
          /tmp/gitleaks detect --no-git --source . --config .gitleaks.toml --redact --no-banner --exit-code 1

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # @0.24.0 was yanked upstream and no longer resolves; track the
      # maintained ref like the docker-build workflow does.
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          # Vulnerability scanning only. The secret-scan job (Gitleaks) is the
          # dedicated secret scanner and honours .gitleaks.toml; Trivy's secret
          # scanner ignores that allowlist and false-positives on the literal
          # `sk_live_…` regex *patterns* inside scripts/*_verify.sh.
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '1'
