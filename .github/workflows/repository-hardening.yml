name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gitleaks Action v2 requires a paid license for organizations
      # (GITLEAKS_LICENSE secret). Until that secret is added, do not fail the
      # PR on this step; it still runs and surfaces findings in the logs.
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '1'
          # These two files are the repo's own secret-detection scripts. Their
          # grep allowlist contains the dummy literal sk_live_REALDANGEROUSKEYSECRET,
          # which trips Trivy's Stripe rule as a false positive. They hold no real
          # secrets, so exclude only these files (Stripe detection stays on elsewhere).
          skip-files: 'scripts/v7_launch_verify.sh,scripts/v10_master_verify.sh'
