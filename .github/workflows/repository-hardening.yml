name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks when license is available
        if: ${{ secrets.GITLEAKS_LICENSE != '' }}
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Skip Gitleaks Action when org license is unavailable
        if: ${{ secrets.GITLEAKS_LICENSE == '' }}
        run: |
          echo "GITLEAKS_LICENSE is not configured."
          echo "Skipping gitleaks/gitleaks-action to avoid blocking CI for organization repositories."
          echo "Add repo/org secret GITLEAKS_LICENSE to enable enforcement."

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned tag 0.24.0 was removed upstream; track @master like docker-build.yml.
      # Informational only: surfaces pre-existing repo-wide findings (e.g. frontend
      # Next.js advisories) without blocking PRs. Remediate deps in a dedicated PR.
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '0'
