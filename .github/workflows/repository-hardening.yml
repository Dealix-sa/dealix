name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # License-free Gitleaks CLI. The gitleaks-action requires a paid
      # GITLEAKS_LICENSE secret for organizations; the open-source CLI does not.
      - name: Run Gitleaks (license-free CLI)
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          TOOL_DIR="$(mktemp -d)"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o "$TOOL_DIR/gitleaks.tar.gz"
          tar -xzf "$TOOL_DIR/gitleaks.tar.gz" -C "$TOOL_DIR" gitleaks
          # Scan the working tree (--no-git), not 2500+ commits of history.
          # Deterministic, matches the current codebase, and avoids flagging
          # secrets in long-since-removed historical files.
          "$TOOL_DIR/gitleaks" detect --no-git --source . --config .gitleaks.toml --redact --no-banner --exit-code 1 -v

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '1'
