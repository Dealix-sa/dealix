name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read

jobs:
  repository-scan:
    name: Repository safety scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify no committed env files
        run: |
          test ! -f .env
          test ! -f .env.production
          test ! -f apps/web/.env.local

      - name: Verify public examples stay safe
        run: |
          grep -q '^EXTERNAL_SEND_ENABLED=false' .env.example
          grep -q '^OUTBOUND_MODE=draft_only' .env.example
          grep -q '^WHATSAPP_ALLOW_LIVE_SEND=false' .env.example

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          format: table
          exit-code: '0'
