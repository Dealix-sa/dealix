name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Use the open-source Gitleaks CLI directly. The gitleaks-action@v2 wrapper
      # now requires a paid GITLEAKS_LICENSE for organizations; the CLI does not.
      - name: Run Gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --no-git --source . --config .gitleaks.toml --redact --no-banner --exit-code 1

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install the Trivy CLI directly via the official script. The previously
      # pinned aquasecurity/trivy-action@0.24.0 tag no longer resolves.
      - name: Run Trivy filesystem scan
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy --version
          trivy fs --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            --exit-code 1 \
            .
