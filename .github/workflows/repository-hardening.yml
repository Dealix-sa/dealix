name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (free CLI via official image)
        # gitleaks-action@v2 requires a paid GITLEAKS_LICENSE for GitHub orgs
        # and failed every run ("missing gitleaks license"). The gitleaks CLI
        # itself is free, so run the official image directly. Report-only
        # (--exit-code 0 + continue-on-error) so a finding surfaces in the log
        # without flapping the gate; flip to --exit-code 1 to enforce once the
        # working tree is confirmed clean. The repo .gitleaks.toml is
        # auto-detected from the scanned directory.
        continue-on-error: true
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            dir /repo --no-banner --redact --exit-code 0

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        # Pinned to the v0.36.0 commit SHA. The previously pinned tag
        # (@0.24.0) stopped resolving after the March 2026 trivy-action
        # tag-force-push compromise; SHA-pinning is the recommended
        # mitigation (tags can be moved, a SHA cannot). SHA verified via
        # `git ls-remote https://github.com/aquasecurity/trivy-action v0.36.0`.
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          # Report-only, mirroring the non-blocking Trivy step already in
          # docker-build.yml. Flip to '1' to make CRITICAL/HIGH findings block.
          exit-code: '0'
