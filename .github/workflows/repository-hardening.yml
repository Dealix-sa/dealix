name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # gitleaks-action@v2 requires a paid license for GitHub organizations and
      # errors out before scanning. Gitleaks the tool is open-source (MIT), so we
      # run the pinned binary directly against the working tree using the repo's
      # .gitleaks.toml — same detection, no license required.
      - name: Run Gitleaks (license-free, open-source binary)
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          /tmp/gitleaks dir . --config .gitleaks.toml --redact --no-banner --exit-code 1

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # Secrets are covered by the dedicated Gitleaks job above. Keep Trivy
          # focused on dependency/OS vulnerabilities so it doesn't duplicate
          # secret-scanning (which produced false positives on the repo's own
          # detection scripts).
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '1'
