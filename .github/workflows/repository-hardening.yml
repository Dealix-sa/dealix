name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks-action@v2 requires a license for organization repos. Run it
      # only when the GITLEAKS_LICENSE org secret is configured; otherwise skip
      # so the check does not hard-fail every PR. Dependency-free secret smoke
      # checks still run via `make security-smoke` / pre-commit.
      - name: Run Gitleaks
        if: env.GITLEAKS_LICENSE != ''
        uses: gitleaks/gitleaks-action@v2

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '1'
