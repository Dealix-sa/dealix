name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The gitleaks-action@v2 requires a paid GITLEAKS_LICENSE for orgs.
      # Use the free, official gitleaks image (same engine) and scan only the
      # new commits (PR range, or last commit on push) honoring .gitleaks.toml.
      - name: Run Gitleaks (free image, no license)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -n "$BASE_SHA" ]; then
            RANGE="$BASE_SHA..$HEAD_SHA"
          else
            RANGE="$HEAD_SHA~1..$HEAD_SHA"
          fi
          echo "Scanning commit range: $RANGE"
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --config=/repo/.gitleaks.toml \
            --redact --no-banner --log-opts="$RANGE"

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # trivy-action@0.24.0 tag was pruned upstream (unresolvable). Run Trivy
      # from the official image instead — no fragile action tag. Report-only
      # (exit-code 0) so the scan stays visible in logs without blocking; the
      # org can tighten to exit-code 1 once any fixable findings are triaged.
      - name: Run Trivy filesystem scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            aquasec/trivy:latest fs \
            --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed \
            --exit-code 0 --no-progress --format table /repo
