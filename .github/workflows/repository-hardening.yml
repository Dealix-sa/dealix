name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Use the free open-source gitleaks binary instead of gitleaks-action@v2,
      # which requires a paid GITLEAKS_LICENSE secret for GitHub organizations.
      - name: Run Gitleaks (open-source binary)
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          chmod +x /tmp/gitleaks
          /tmp/gitleaks version
          /tmp/gitleaks dir . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --no-banner \
            --exit-code 1

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Trivy via the official script instead of the marketplace action,
      # whose pinned tags (0.24.0 / 0.30.0) stopped resolving on GitHub.
      - name: Install Trivy
        run: |
          set -euo pipefail
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Run Trivy filesystem scan
        run: |
          trivy fs . \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            --exit-code 1
