name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The gitleaks GitHub Action requires a paid license for organizations.
      # Use the free open-source gitleaks CLI instead — same scanner, no license.
      # On PRs, scan only the PR commit range (fast, no false-positives from
      # pre-existing history); on push/schedule, scan full history as a net.
      - name: Run Gitleaks (OSS CLI — no org license required)
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --quiet origin "${{ github.base_ref }}"
            echo "Scanning PR range origin/${{ github.base_ref }}..HEAD"
            gitleaks detect --source . --config .gitleaks.toml --redact --no-banner \
              --log-opts="origin/${{ github.base_ref }}..HEAD" --exit-code 1
          else
            echo "Scanning full history"
            gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1
          fi

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '1'
