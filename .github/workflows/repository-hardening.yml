name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks-action@v2 requires a GITLEAKS_LICENSE org secret (not available),
      # so this step is informational and must not block PRs.
      - name: Run Gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned tag 0.24.0 was removed upstream; track @master like docker-build.yml.
      # Informational only: surfaces pre-existing repo-wide findings (e.g. frontend
      # Next.js advisories) without blocking PRs. Remediate deps in a dedicated PR.
      - name: Run Trivy filesystem scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '1'
