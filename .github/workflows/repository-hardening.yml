name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gitleaks-action requires a paid license for organization repos. Run the
    # scan only when the GITLEAKS_LICENSE secret is configured; otherwise skip
    # cleanly so the missing license does not block every PR.
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        if: ${{ env.GITLEAKS_LICENSE != '' }}
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Gitleaks skipped (no license)
        if: ${{ env.GITLEAKS_LICENSE == '' }}
        run: |
          echo "GITLEAKS_LICENSE secret is not set — skipping the org-licensed Gitleaks scan."
          echo "Add the secret (https://gitleaks.io) to enable secret scanning as a blocking gate."

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          format: table
          exit-code: '1'
