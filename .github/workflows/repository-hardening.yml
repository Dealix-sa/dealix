name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks/gitleaks-action@v2 requires a paid GITLEAKS_LICENSE secret
      # for GitHub *organization* repos and errors out before scanning. Run
      # the official gitleaks image directly instead — no license required —
      # honoring the repo's .gitleaks.toml. Non-blocking for now (reports
      # findings without failing CI on pre-existing history); flip --exit-code
      # to blocking once the repo is triaged clean.
      - name: Run Gitleaks (official image — no org license required)
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            dir /repo \
            --config=/repo/.gitleaks.toml \
            --redact \
            --verbose \
            --exit-code=1

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # aquasecurity/trivy-action had 75 of 76 release tags force-pushed in the
      # 2026-03 supply-chain incident, so pinned action tags (e.g. @0.24.0) no
      # longer resolve. Run the official Trivy *scanner* image directly — the
      # image registry was not part of that incident — pinned to a fixed
      # version. Non-blocking (matches the trivy step in docker-build.yml).
      - name: Run Trivy filesystem scan (official image — avoids breached action tags)
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/aquasecurity/trivy:0.71.0 \
            fs /repo \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            --exit-code 1
