name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # gitleaks-action requires a license for GitHub organizations. When the
      # GITLEAKS_LICENSE secret is absent, skip the licensed step instead of
      # hard-failing every PR — detect-secrets (.secrets.baseline),
      # scripts/security_smoke.py, and CodeQL remain as complementary controls.
      HAS_GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        if: env.HAS_GITLEAKS_LICENSE == 'true'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Gitleaks skipped (no license)
        if: env.HAS_GITLEAKS_LICENSE != 'true'
        run: |
          echo "::notice::Gitleaks skipped — set the GITLEAKS_LICENSE org secret to enable licensed secret scanning."
          echo "Complementary controls still run: detect-secrets (.secrets.baseline), scripts/security_smoke.py, CodeQL."

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        # @0.24.0 was removed upstream; @master matches docker-build.yml and
        # resolves reliably. exit-code 1 is kept so real CRITICAL/HIGH findings
        # still block (the security gate is not weakened).
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '1'
