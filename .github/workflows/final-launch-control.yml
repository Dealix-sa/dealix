name: Final Launch Control

# Artifact-only, read-only evidence workflow for the Dealix launch control tower.
# It NEVER sends anything externally. No secrets are used. It only generates
# review-only drafts, audits safety, verifies readiness, and uploads artifacts.

on:
  workflow_dispatch:
  schedule:
    # 05:00 UTC daily (08:00 Riyadh)
    - cron: "0 5 * * *"

# Minimal permissions: read-only contents, nothing else.
permissions:
  contents: read

concurrency:
  group: final-launch-control-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Generate 400+ review-only drafts
        run: python scripts/commercial_generate_400_drafts.py --target 400

      - name: Safety audit
        run: python scripts/commercial_safety_audit.py

      - name: Launch readiness
        run: python scripts/commercial_launch_readiness.py --target 400

      - name: Media & social calendar
        run: python scripts/media_social_calendar_generate.py

      - name: CRM schema verify
        run: python scripts/commercial_crm_schema_verify.py

      - name: API static check
        run: python scripts/api_commercial_static_check.py

      - name: Site static check
        run: python scripts/site_launch_static_check.py

      - name: Media/social verify
        run: python scripts/media_social_verify.py

      - name: Secret & risk scan
        run: python scripts/final_secret_and_risk_scan.py

      - name: Master verification
        run: python scripts/final_launch_control_verify.py

      - name: Run launch control tests
        # --noconftest: the launch-control suite is self-contained and uses no
        # shared fixtures, so it runs without installing the full app stack.
        run: |
          pytest -q --noconftest -p no:cacheprovider \
            tests/test_commercial_generate_400_drafts.py \
            tests/test_commercial_safety_audit.py \
            tests/test_commercial_launch_readiness.py \
            tests/test_commercial_no_external_send.py \
            tests/test_commercial_quality_gate.py \
            tests/test_commercial_compliance_gate.py \
            tests/test_commercial_outputs_schema.py \
            tests/test_media_social_os.py \
            tests/test_final_launch_control_verify.py \
            tests/test_site_launch_static_check.py \
            tests/test_media_social_verify.py \
            tests/test_crm_schema_verify.py \
            tests/test_api_commercial_static_check.py \
            tests/test_final_secret_and_risk_scan.py

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-launch-control-evidence
          path: |
            outputs/commercial_launch/
            outputs/media_social/
            outputs/final_launch_control/
            docs/launch-control/99_FINAL_CONTROL_TOWER_REPORT.md
          retention-days: 30
