name: Full Company OS

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: full-company-os-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify draft-only Full Company OS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Full Company OS draft-only cycle
        run: |
          python scripts/commercial/run_full_company_os.py --client dealix --mode draft-only --limit 10 --json

      - name: Verify Full Company OS safety and outputs
        run: |
          python scripts/commercial/verify_full_company_os.py

      - name: Run first paid client manual path
        run: |
          python scripts/commercial/run_first_paid_client_path.py

      - name: Verify first paid client revenue guardrails
        run: |
          python scripts/commercial/verify_first_paid_client_path.py

      - name: Render daily GitHub issue body
        run: |
          python scripts/commercial/render_full_company_os_issue.py --output reports/full_company_os/daily_issue.md

      - name: Create or update daily command issue
        env:
          GH_TOKEN: ${{ github.token }}
          DAILY_TITLE: Dealix Daily Command - ${{ github.run_id }}
        run: |
          TODAY_TITLE="Dealix Daily Command - $(date -u +%F)"
          gh label create daily-command --color ededed --description "Daily Dealix Company OS command reports" || true
          gh label create dealix-os --color ededed --description "Dealix operating system work" || true
          gh label create safe-draft --color ededed --description "Draft-only, approval-first automation" || true
          EXISTING_ISSUE="$(gh issue list --state open --search "${TODAY_TITLE} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$EXISTING_ISSUE" ]; then
            gh issue edit "$EXISTING_ISSUE" --body-file reports/full_company_os/daily_issue.md --add-label daily-command --add-label dealix-os --add-label safe-draft
            echo "Updated issue #${EXISTING_ISSUE}"
          else
            gh issue create --title "$TODAY_TITLE" --body-file reports/full_company_os/daily_issue.md --label daily-command --label dealix-os --label safe-draft
          fi

      - name: Upload Full Company OS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-company-os-report
          path: |
            reports/full_company_os/latest.json
            reports/full_company_os/latest.md
            reports/full_company_os/daily_issue.md
            reports/full_company_os_verify/latest.json
            reports/full_company_os_verify/latest.md
            reports/full_company_os/revenue_path/first_paid_client_path.json
            reports/full_company_os/revenue_path/first_paid_client_path.md
            reports/full_company_os_first_paid_verify/first_paid_client_path.json
            reports/full_company_os_first_paid_verify/first_paid_client_path.md
          if-no-files-found: warn
