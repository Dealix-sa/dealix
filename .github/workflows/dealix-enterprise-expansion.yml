name: Dealix Enterprise Expansion Checks
on:
  pull_request:
  push:
    branches: [main]
jobs:
  enterprise-expansion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify enterprise operating expansion
        run: python scripts/verify_enterprise_operating_expansion.py
      - name: Compile control plane and CLI packages
        run: |
          set -e
          targets=""
          for dir in control_plane scripts dealix_cli ops_runtime; do
            if [ -d "$dir" ]; then
              targets="$targets $dir"
            fi
          done
          if [ -n "$targets" ]; then
            python -m compileall -q $targets
          else
            echo "No compilable targets found — skipping."
          fi
