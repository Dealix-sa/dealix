name: CI

on:
  push:
    branches:
      - main
      - dealix-v3-autonomous-revenue-os
      - 'copilot/**'
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
      - dealix-v3-autonomous-revenue-os
      - 'copilot/**'
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    name: Python quality, tests, readiness
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      APP_ENV: test
      APP_DEBUG: "false"
      ANTHROPIC_API_KEY: test-anthropic-key
      DEEPSEEK_API_KEY: test-deepseek-key
      GROQ_API_KEY: test-groq-key
      GLM_API_KEY: test-glm-key
      GOOGLE_API_KEY: test-google-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio pytest-cov httpx aiosqlite
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Environment contract check
        run: python scripts/check_env_contract.py

      - name: Compile check
        run: python -m compileall api auto_client_acquisition autonomous_growth core db integrations dealix scripts

      - name: OpenAPI contract export smoke
        run: python scripts/export_openapi.py --output /tmp/dealix-openapi.json

      - name: Alembic single head
        run: python scripts/check_alembic_single_head.py

      - name: Verify Service Readiness Matrix
        run: python scripts/verify_service_readiness_matrix.py

      - name: Quick regression bundle
        run: |
          pytest \
            tests/test_pg_event_store.py \
            tests/test_model_router.py \
            tests/test_integrations.py \
            tests/test_v5_layers.py \
            tests/unit/test_compliance_os.py \
            tests/test_isolated_pg_event_store.py \
            -q --no-cov

      - name: Export Service Readiness JSON
        run: |
          python scripts/export_service_readiness_json.py
          git diff --exit-code -- landing/assets/data/service-readiness.json

      - name: SEO audit
        run: |
          python scripts/seo_audit.py
          git diff --exit-code -- docs/SEO_AUDIT_REPORT.json

      - name: Tests with coverage gate
        run: |
          pytest -q \
            --cov=api --cov=core --cov=db --cov=integrations \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: In-process API smoke
        run: python scripts/smoke_inprocess.py

      - name: Embeddings pipeline placeholder
        run: python scripts/embeddings_pipeline_placeholder.py

      - name: Deterministic eval smoke
        run: python scripts/run_evals.py

  web-build:
    name: Next.js web build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build web app
        run: npm run build
