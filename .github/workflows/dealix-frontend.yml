name: Dealix Frontend Checks

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "scripts/verify_frontend.py"
      - "scripts/verify_frontend_api_contract.py"
      - ".github/workflows/dealix-frontend.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"

permissions:
  contents: read

jobs:
  build:
    name: apps/web build (F1)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  contract:
    name: Frontend API contract (F2/F3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify contract files
        run: python3 scripts/verify_frontend_api_contract.py

      - name: Generate route inventory
        run: python3 scripts/generate_frontend_route_inventory.py
