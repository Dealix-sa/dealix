name: Distribution Draft Day

# Scheduled founder command report. Read-only / draft-only: it generates the
# day's report, runs the draft quality gate, and writes the metrics snapshot,
# then uploads them as an artifact. It NEVER sends a message or charges anyone,
# and it does not push commits (least-privilege contents: read).

on:
  schedule:
    - cron: "0 5 * * 0-4"  # 05:00 UTC, Sun-Thu (Saudi working week)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: distribution-draft-day
  cancel-in-progress: false

jobs:
  draft-day:
    name: Generate the daily distribution command
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Distribution day report
        run: python scripts/distribution_day.py

      - name: Draft quality gate
        run: python scripts/check_draft_quality.py

      - name: Distribution metrics snapshot
        run: python scripts/distribution_metrics.py

      - name: Upload reports artifact
        uses: actions/upload-artifact@v7
        with:
          name: distribution-day-reports
          path: reports/distribution/*.md
          if-no-files-found: warn
