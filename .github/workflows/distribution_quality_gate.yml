name: Distribution Quality Gate

# Runs on PRs that touch the Revenue Execution OS, plus pushes to the usual
# branches. Enforces the draft quality gate, the distribution_os test suite,
# schema validity, and the agent security gate. Least-privilege.

on:
  pull_request:
    paths:
      - "auto_client_acquisition/distribution_os/**"
      - "api/routers/distribution.py"
      - "scripts/check_draft_quality.py"
      - "scripts/distribution_*.py"
      - "scripts/agent_security_gate.py"
      - "schemas/**"
      - "tests/test_distribution_*.py"
      - "tests/test_agent_security_gate.py"
      - ".github/workflows/distribution_quality_gate.yml"
  push:
    branches:
      - main
      - 'claude/**'
      - 'feat/**'
      - 'fix/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: distribution-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: distribution_os tests + draft quality + schemas
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: test
      APP_SECRET_KEY: ci_only_secret_key_0123456789abcdef0123456789abcdef
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio pytest-cov pytest-timeout httpx aiosqlite jsonschema
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Compile check (distribution_os + router + scripts)
        run: |
          python -m compileall \
            auto_client_acquisition/distribution_os \
            api/routers/distribution.py \
            scripts/check_draft_quality.py scripts/distribution_day.py \
            scripts/distribution_metrics.py scripts/agent_security_gate.py

      - name: Validate JSON schemas
        run: |
          python - <<'PY'
          import glob, json, jsonschema
          for f in sorted(glob.glob("schemas/*.schema.json")):
              jsonschema.Draft202012Validator.check_schema(json.load(open(f)))
              print("schema OK:", f)
          PY

      - name: Distribution OS test suite (+ doctrine)
        run: |
          pytest \
            tests/test_distribution_os_catalog.py \
            tests/test_distribution_os_prospect_draft.py \
            tests/test_distribution_os_proposal_payment.py \
            tests/test_distribution_os_followup_metrics.py \
            tests/test_distribution_os_doctrine.py \
            tests/test_distribution_api.py \
            tests/test_agent_security_gate.py \
            -q --no-cov

      - name: Repo doctrine guards (non-negotiables)
        run: |
          pytest \
            tests/test_no_cold_whatsapp.py \
            tests/test_no_linkedin_automation.py \
            tests/test_no_scraping_engine.py \
            tests/test_no_guaranteed_claims.py \
            tests/test_output_requires_governance_status.py \
            tests/test_proof_pack_required.py \
            -q --no-cov

      - name: Draft quality gate (example drafts must be clean)
        run: |
          python scripts/check_draft_quality.py --input data/drafts/drafts.example.jsonl

      - name: Agent security gate
        run: python scripts/agent_security_gate.py
