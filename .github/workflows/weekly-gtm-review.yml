name: Weekly GTM Review

# Weekly GTM learning loop (~09:00 KSA Sunday / 06:00 UTC). Renders the
# weekly review template + re-runs the doctrine gate. Founder fills the
# review dimensions from real CRM data (automation never invents metrics).

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: weekly-gtm-review
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Doctrine gate
        run: python scripts/gtm_quality_gate.py

      - name: Render weekly review template
        run: |
          mkdir -p reports/gtm
          python - <<'PY'
          from auto_client_acquisition.market_production_os import weekly_gtm_review
          # Dimensions left blank: the founder fills them from real CRM data.
          md = weekly_gtm_review({})
          with open("reports/gtm/WEEKLY_GTM_REVIEW.md", "w", encoding="utf-8") as f:
              f.write(md)
          print("wrote reports/gtm/WEEKLY_GTM_REVIEW.md")
          PY

      - name: Upload weekly review
        uses: actions/upload-artifact@v4
        with:
          name: weekly-gtm-review-${{ github.run_id }}
          path: |
            reports/gtm/WEEKLY_GTM_REVIEW.md
          retention-days: 30
          if-no-files-found: warn
