name: dealix-everything
on:
  workflow_dispatch:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    name: verify_everything
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml fastapi httpx pydantic
      - name: Run master verifier
        run: python scripts/verify_everything.py
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dealix-readiness-report
          path: |
            docs/ops/DEALIX_FINAL_READINESS_REPORT.md
            docs/ops/DEALIX_MISSING_SYSTEMS.md
            evals/eval_status.csv
