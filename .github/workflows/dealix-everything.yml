name: Dealix Everything

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly at 02:00 UTC.
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  everything:
    name: make everything (26 layers)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install PyYAML (verifier-only dependency)
        run: python -m pip install --upgrade pip PyYAML
      - name: Run supreme verifier
        run: make everything
