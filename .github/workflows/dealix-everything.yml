name: dealix-everything

# Anti-bullshit gate. Reads dealix_manifest.yaml and judges the repo against
# it. PRs that break any contract layer (missing file, empty file, missing
# keyword, banned claim, sub-verifier failure) fail this workflow.
#
# Wire as a required status check on main:
#   Settings → Branches → main → require dealix-everything / verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dealix-everything-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: dealix-everything verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps (PyYAML only — verifiers are stdlib)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Repo completeness
        run: python scripts/verify_repo_completeness.py

      - name: Wiring
        run: python scripts/verify_wiring.py

      - name: Policy-as-code
        run: python scripts/verify_policy_as_code.py

      - name: Agent registry
        run: python scripts/verify_agent_registry.py

      - name: Eval gate
        run: python scripts/verify_eval_gate.py

      - name: Live-send safety
        run: python scripts/verify_live_send_safety.py

      - name: Railway readiness
        run: python scripts/verify_railway_readiness.py

      - name: Business OS
        run: python scripts/verify_business_os.py

      - name: Verify EVERYTHING (manifest gate)
        run: python scripts/verify_everything.py
