name: Real Revenue Day

on:
  workflow_dispatch:
  schedule:
    - cron: '35 6 * * *'

permissions:
  contents: read
  actions: read

jobs:
  real-revenue-day:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Real Revenue Day
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
        run: ./scripts/dealix_real_revenue_day.sh

      - uses: actions/upload-artifact@v4
        with:
          name: real-revenue-day
          path: |
            company/runtime/places/
            company/runtime/revenue/
            company/reports/
            company/outbox/
            company/crm/
