name: dealix-control

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  control-plane:
    name: Control plane checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: pip install pydantic pydantic-settings

      - name: Verify architecture
        run: python scripts/verify_architecture.py

      - name: Verify control plane
        run: python scripts/verify_control_plane.py

      - name: Verify stage status
        run: python scripts/verify_stage_status.py
