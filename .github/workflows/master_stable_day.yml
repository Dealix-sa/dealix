name: Master Stable Day

on:
  workflow_dispatch:
  schedule:
    - cron: '20 6 * * *'

permissions:
  contents: read
  actions: read

jobs:
  master-stable-day:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal Python dependencies
        run: python -m pip install pyyaml

      - name: Run Master Stable Day
        env:
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          API_KEYS: ${{ secrets.API_KEYS }}
          ADMIN_API_KEYS: ${{ secrets.ADMIN_API_KEYS }}
          DEALIX_ADMIN_API_KEY: ${{ secrets.DEALIX_ADMIN_API_KEY }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: ./scripts/dealix_master_stable_day.sh

      - name: Upload Master Stable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: master-stable-day
          path: |
            company/reports/
            company/outbox/
            company/crm/
            company/lead_research/
            founder_os/output/
