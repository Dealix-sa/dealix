name: Micro Day

on:
  workflow_dispatch:
  schedule:
    - cron: '10 6 * * *'

permissions:
  contents: read
  actions: read

jobs:
  micro-day:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Micro Day
        env:
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: ./scripts/dealix_micro_day.sh

      - uses: actions/upload-artifact@v4
        with:
          name: micro-day
          path: |
            company/reports/
            company/outbox/
            company/crm/
