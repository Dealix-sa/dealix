name: Dealix V12 Scale Cadence
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'
permissions:
  contents: read
jobs:
  scale-cadence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: V12 readiness
        run: python scripts/dealix_v12_readiness_check.py
      - name: Weekly rhythm
        run: python scripts/dealix_weekly_operating_rhythm.py
      - name: Scale dashboard
        run: python scripts/dealix_scale_dashboard.py
