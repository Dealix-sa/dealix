name: M&A Radar — Daily Intelligence Scan

# Runs every day at 07:30 AST (04:30 UTC).
# Governed: --dry-run only. No external writes. Artifacts uploaded for founder review.

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

concurrency:
  group: m-and-a-intelligence-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  m-and-a-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: pip install httpx

      - name: Run M&A radar scan (dry-run)
        env:
          DEALIX_API_BASE: ${{ secrets.DEALIX_API_BASE }}
          DEALIX_ADMIN_API_KEY: ${{ secrets.DEALIX_ADMIN_API_KEY }}
          PYTHONIOENCODING: utf-8
          APP_ENV: test
        run: |
          python3 scripts/run_m_and_a_radar_scan.py --dry-run

      - name: Upload M&A radar artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ma-radar-${{ github.run_id }}
          path: |
            data/founder_briefs/MA_RADAR_*.md
            var/m_and_a_proposals.jsonl
          retention-days: 30
          if-no-files-found: ignore
