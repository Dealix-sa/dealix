name: Dealix Executive Control Checks
on:
  pull_request:
  push:
    branches: [main]
jobs:
  executive-control:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify executive control plane
        run: python scripts/verify_executive_control_plane.py
      - name: Compile executive control plane
        run: python -m compileall control_plane scripts dealix_cli ops_runtime
