name: Deploy to Railway

# Deploys Dealix backend to Railway using Railway CLI.
# Project tokens use RAILWAY_TOKEN. Account/workspace tokens use
# RAILWAY_API_TOKEN. Values remain sealed in GitHub Actions secrets.

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/railway_deploy.yml"
      - "api/**"
      - "core/**"
      - "dealix/**"
      - "auto_client_acquisition/**"
      - "autonomous_growth/**"
      - "integrations/**"
      - "db/**"
      - "cli.py"
      - "Dockerfile"
      - "railway.json"
      - "railway.toml"
      - "Procfile"
      - "requirements.txt"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      service:
        description: "Railway service name"
        required: false
        default: "dealix"
        type: string

jobs:
  deploy:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check Railway credential mode
        id: check_token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$RAILWAY_TOKEN" ]; then
            echo "token_present=true" >> "$GITHUB_OUTPUT"
            echo "token_mode=project" >> "$GITHUB_OUTPUT"
          elif [ -n "$RAILWAY_API_TOKEN" ]; then
            echo "token_present=true" >> "$GITHUB_OUTPUT"
            echo "token_mode=account_or_workspace" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Neither RAILWAY_TOKEN nor RAILWAY_API_TOKEN is configured."
            echo "token_present=false" >> "$GITHUB_OUTPUT"
            echo "token_mode=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Railway CLI
        if: steps.check_token.outputs.token_present == 'true'
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://railway.com/install.sh) -y
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"
          "$HOME/.railway/bin/railway" --version

      - name: Deploy to Railway
        id: railway_deploy
        if: steps.check_token.outputs.token_present == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          TOKEN_MODE: ${{ steps.check_token.outputs.token_mode }}
          INPUT_SERVICE: ${{ inputs.service }}
          CONFIG_SERVICE: ${{ vars.RAILWAY_SERVICE_NAME }}
          PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          ENVIRONMENT_NAME: ${{ vars.RAILWAY_ENVIRONMENT_NAME }}
        run: |
          set -uo pipefail
          mkdir -p reports/ci
          LOG="reports/ci/railway-deploy.log"
          SERVICE="${INPUT_SERVICE:-${CONFIG_SERVICE:-dealix}}"

          cmd=(railway up --service "$SERVICE" --detach --verbose)
          if [ -n "$PROJECT_ID" ]; then
            cmd+=(--project "$PROJECT_ID")
          fi
          if [ -n "$ENVIRONMENT_NAME" ]; then
            cmd+=(--environment "$ENVIRONMENT_NAME")
          fi

          {
            echo "commit=${GITHUB_SHA}"
            echo "token_mode=${TOKEN_MODE}"
            echo "service=${SERVICE}"
            echo "project_flag_configured=$([ -n "$PROJECT_ID" ] && echo true || echo false)"
            echo "environment_flag_configured=$([ -n "$ENVIRONMENT_NAME" ] && echo true || echo false)"
            echo "railway_version=$(railway --version 2>&1 | head -1)"
            echo "== pre-deploy status =="
            railway status --json || true
            if [ "$TOKEN_MODE" = "account_or_workspace" ]; then
              echo "== account/workspace identity =="
              railway whoami || true
            else
              echo "== identity check =="
              echo "Skipped account-level whoami for project-scoped RAILWAY_TOKEN."
            fi
            echo "== railway up =="
          } 2>&1 | tee "$LOG"

          set +e
          "${cmd[@]}" 2>&1 | tee -a "$LOG"
          rc=${PIPESTATUS[0]}
          set -e

          echo "railway_up_exit_code=$rc" | tee -a "$LOG"
          if [ "$rc" -ne 0 ]; then
            echo "::error::Railway deploy failed; inspect railway-deploy-diagnostics."
            exit "$rc"
          fi

      - name: Upload Railway deploy diagnostics
        if: always() && steps.check_token.outputs.token_present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: railway-deploy-diagnostics
          path: reports/ci/railway-deploy.log
          if-no-files-found: warn
          retention-days: 7

      - name: Wait for deployment to become active
        if: steps.railway_deploy.outcome == 'success'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          echo "Waiting 60 seconds for deployment to start..."
          sleep 60
          railway status --json || true

      - name: Smoke test /healthz
        id: healthz
        if: steps.railway_deploy.outcome == 'success'
        run: |
          URL="${{ vars.RAILWAY_PUBLIC_URL || 'https://api.dealix.me' }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Smoke-testing trust layer on $URL"

          for i in {1..12}; do
            hz=$(curl -sS --max-time 10 "$URL/healthz" || echo "")
            ver=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$URL/version" || echo "000")
            meta=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$URL/api/v1/meta" || echo "000")
            echo "Attempt $i: healthz=$(echo "$hz" | head -c 80) version=$ver meta=$meta"
            if [ "$ver" = "200" ] && [ "$meta" = "200" ] && echo "$hz" | grep -q '"version"'; then
              echo "✅ trust layer live (/healthz+version, /version, /api/v1/meta)"
              exit 0
            fi
            sleep 15
          done

          echo "::error::Trust layer not ready after 3 minutes."
          exit 1

      - name: Post-deploy smoke pack
        if: steps.healthz.outcome == 'success'
        env:
          BASE_URL: ${{ steps.healthz.outputs.url }}
        run: |
          set -euo pipefail
          echo "→ /api/v1/pricing/plans"
          curl -fsS --max-time 10 "$BASE_URL/api/v1/pricing/plans" | head -c 400; echo

          echo "→ /api/v1/prospect/search-diag"
          curl -fsS --max-time 10 "$BASE_URL/api/v1/prospect/search-diag" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('tier1=', d.get('tier1_ready'), 'tier2=', d.get('tier2_ready'))"

          echo "→ webhook 401-on-bad-signature (security smoke)"
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 \
            -X POST "$BASE_URL/api/v1/webhooks/moyasar" \
            -H "Content-Type: application/json" \
            -H "X-Moyasar-Signature: bogus" \
            -d '{"event":"payment_paid","data":{}}')
          if [ "$code" != "401" ] && [ "$code" != "403" ]; then
            echo "::error::Moyasar webhook accepted bad signature (got $code, expected 401/403)"
            exit 1
          fi
          echo "✓ webhook rejected bad signature"
          echo "✅ post-deploy smoke pack passed"
