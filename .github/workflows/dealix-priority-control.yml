name: Dealix Priority Control Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  priority-control:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify revenue control
        run: python scripts/verify_revenue_control.py

      - name: Verify trust control
        run: python scripts/verify_trust_control.py

      - name: Verify delivery control
        run: python scripts/verify_delivery_control.py

      - name: Verify full ops
        run: python scripts/verify_full_ops.py

      - name: Compile
        run: python -m compileall dealix_cli scripts
