name: Founder Business Autopilot

on:
  workflow_dispatch:
  schedule:
    - cron: '10 5 * * *'

permissions:
  contents: read
  actions: read

jobs:
  generate-founder-business-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal dependencies
        run: python -m pip install pyyaml

      - name: Generate founder business pack
        run: bash scripts/dealix_founder_business_day.sh

      - name: Upload founder business pack
        uses: actions/upload-artifact@v7
        with:
          name: founder-business-pack
          path: founder_os/output/
