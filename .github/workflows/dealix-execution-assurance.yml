name: Dealix Execution Assurance Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  execution-assurance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify execution assurance system
        run: python scripts/verify_execution_assurance_system.py

      - name: Compile
        run: python -m compileall ops_runtime scripts dealix_cli
