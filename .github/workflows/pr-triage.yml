name: PR Triage

on:
  schedule:
    # Weekly snapshot, Sunday 05:00 UTC (08:00 KSA)
    - cron: "0 5 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-triage
  cancel-in-progress: true

jobs:
  pr-triage:
    name: PR Triage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Triage open PRs (report-only — never merges or comments)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/triage_open_prs.py

      - name: Upload triage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: open-pr-triage
          path: reports/pr_triage/*
          if-no-files-found: ignore
