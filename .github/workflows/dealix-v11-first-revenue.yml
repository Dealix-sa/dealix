name: Dealix V11 First Revenue Sprint
on:
  workflow_dispatch:
  schedule:
    - cron: '10 5 * * 1-5'
permissions:
  contents: read
jobs:
  first-revenue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/dealix_v11_readiness_check.py
      - run: python scripts/dealix_first_revenue_sprint.py
      - run: python scripts/dealix_revenue_dashboard.py
