name: Site & Commercial Verify

# Static checks for the website launch surface, CRM schema, and commercial API
# contract. No build secrets required. Read-only.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/web/**"
      - "docs/site-launch/**"
      - "docs/commercial-launch/**"
      - "config/**"
      - "scripts/site_launch_static_check.py"
      - "scripts/commercial_crm_schema_verify.py"
      - "scripts/api_commercial_static_check.py"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Static checks
        run: |
          python scripts/site_launch_static_check.py
          python scripts/commercial_crm_schema_verify.py
          python scripts/api_commercial_static_check.py
          python scripts/commercial_seed_leads_validate.py
