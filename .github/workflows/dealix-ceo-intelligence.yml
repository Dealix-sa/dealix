name: Dealix CEO Intelligence Checks
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ceo-intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify CEO operating intelligence v4
        run: python scripts/verify_ceo_operating_intelligence_v4.py
      - name: Compile
        run: python -m compileall control_plane scripts dealix_cli ops_runtime
