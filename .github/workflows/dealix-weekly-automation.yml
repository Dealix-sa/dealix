name: Dealix Weekly Automation Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  weekly-automation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify weekly automation
        run: python scripts/verify_weekly_automation.py

      - name: Compile weekly automation
        run: python -m compileall ops_runtime scripts
