name: Dealix Weekly Automation

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "ops_runtime/**"
      - "scripts/verify_weekly_automation.py"
      - ".github/workflows/dealix-weekly-automation.yml"
  pull_request:
    paths:
      - "ops_runtime/**"
      - "scripts/verify_weekly_automation.py"
      - ".github/workflows/dealix-weekly-automation.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: python -m pip install --upgrade pip pyyaml
      - name: Verify weekly automation
        run: python scripts/verify_weekly_automation.py
