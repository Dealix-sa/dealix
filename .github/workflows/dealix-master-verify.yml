name: Dealix Master Verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  master-verify:
    name: master-verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt || pip install -r requirements.txt

      - name: Master Verify (CI; no PRIVATE_OPS)
        id: verify
        run: |
          python3 scripts/master_verify.py --json-out master-verify.json
        env:
          DEALIX_SKIP_MYPY: "1"

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-verify-report
          path: master-verify.json
          retention-days: 14

      - name: Print summary
        if: always()
        run: |
          if [ -f master-verify.json ]; then
            python3 -c "import json; r=json.load(open('master-verify.json')); print('Overall:', r['overall']); print('Warnings:', r.get('warnings',0));"
          fi
