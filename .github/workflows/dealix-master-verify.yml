name: Dealix Master Verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  master-verify:
    name: master-verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt || pip install -r requirements.txt

      - name: Master Verify (CI; no PRIVATE_OPS)
        id: verify
        run: |
          set +e
          python3 scripts/master_verify.py --json-out master-verify.json
          rc=$?
          echo "::group::master-verify.json"
          cat master-verify.json
          echo "::endgroup::"
          exit $rc
        env:
          DEALIX_SKIP_MYPY: "1"

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-verify-report
          path: master-verify.json
          retention-days: 14

      - name: Post failure summary as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Dealix Master Verify — FAILED\n\n';
            try {
              const report = JSON.parse(fs.readFileSync('master-verify.json', 'utf8'));
              body += `**Overall**: ${report.overall} · **warnings**: ${report.warnings} · **sha**: \`${report.git_sha.slice(0,7)}\`\n\n`;
              body += '| Layer | Verdict | Exit | Duration | Summary |\n|---|---|---|---|---|\n';
              for (const r of report.layers) {
                body += `| L${r.layer} ${r.name} | ${r.verdict} | ${r.exit_code} | ${r.duration_s}s | ${r.summary || ''} |\n`;
              }
              for (const r of report.layers) {
                if (r.exit_code !== 0) {
                  body += `\n### L${r.layer} ${r.name} (exit ${r.exit_code})\n`;
                  if (r.stdout_tail) body += '<details><summary>stdout tail</summary>\n\n```\n' + r.stdout_tail.slice(-3000) + '\n```\n</details>\n';
                  if (r.stderr_tail) body += '<details><summary>stderr tail</summary>\n\n```\n' + r.stderr_tail.slice(-3000) + '\n```\n</details>\n';
                }
              }
            } catch (e) {
              body += `(could not parse master-verify.json: ${e.message})\n`;
            }
            body += `\nFull log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

