name: Distribution Weekly Review

# Weekly learning rollup. Read-only: writes the metrics snapshot and prints the
# win/loss + weekly-questions summary, then uploads them as an artifact. No
# external send, no commit (least-privilege contents: read).

on:
  schedule:
    - cron: "0 6 * * 0"  # 06:00 UTC Sunday (start of the Saudi week)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: distribution-weekly-review
  cancel-in-progress: false

jobs:
  weekly-review:
    name: Weekly distribution review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Metrics snapshot (daily + weekly)
        run: python scripts/distribution_metrics.py

      - name: Win/loss + weekly questions
        run: |
          python - <<'PY'
          from auto_client_acquisition.distribution_os import win_loss
          print("Win/Loss summary:", win_loss.summarize())
          print("\nWeekly questions:")
          for q in win_loss.WEEKLY_QUESTIONS:
              print(" -", q)
          PY

      - name: Upload weekly artifact
        uses: actions/upload-artifact@v7
        with:
          name: distribution-weekly-review
          path: reports/distribution/*.md
          if-no-files-found: warn
