name: Dealix Implementation Automation Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  implementation-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify implementation automation pack
        run: python scripts/verify_implementation_automation_pack.py
      - name: Compile
        run: python -m compileall scripts ops_runtime dealix_cli control_plane execution_engine
