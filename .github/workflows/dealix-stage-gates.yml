name: Dealix Stage Gates

on:
  push:
    branches: [main]
    paths:
      - "docs/trust/**"
      - "docs/revenue/**"
      - "docs/offers/revenue_sprint/**"
      - "docs/delivery/revenue_sprint/**"
      - "scripts/verify_stage_gated_roadmap.py"
      - "scripts/verify_tier0_safety.py"
      - ".github/workflows/dealix-stage-gates.yml"
  pull_request:
    paths:
      - "docs/trust/**"
      - "docs/revenue/**"
      - "docs/offers/revenue_sprint/**"
      - "docs/delivery/revenue_sprint/**"
      - "scripts/verify_stage_gated_roadmap.py"
      - "scripts/verify_tier0_safety.py"
      - ".github/workflows/dealix-stage-gates.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: python -m pip install --upgrade pip pyyaml
      - name: Verify stage-gated roadmap
        run: python scripts/verify_stage_gated_roadmap.py
      - name: Verify tier 0 safety
        run: python scripts/verify_tier0_safety.py
