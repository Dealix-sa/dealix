name: Dealix Acquisition Autopilot Checks
on:
  pull_request:
  push:
    branches: [main]
jobs:
  acquisition-autopilot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify acquisition autopilot
        run: python scripts/verify_acquisition_autopilot.py
      - name: Compile
        run: python -m compileall scripts
