name: Security Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify no autonomous external actions
        run: python scripts/verify_no_autonomous_external_actions.py

      - name: Verify trust boundary terms
        run: python scripts/verify_trust_boundary_terms.py
