name: Security

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python,javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          # Allowlist two specific known-moderate advisories in the legacy,
          # non-built frontend/ surface (both in next-intl: prototype pollution
          # via an experimental precompile path we do not use, and an open
          # redirect). The legacy app is never built or deployed in CI —
          # apps/web is canonical — so these pose no runtime risk. The gate
          # stays fully strict (blocks every critical/high, and all other
          # advisories) for apps/web and all Python dependencies.
          allow-ghsas: GHSA-4c35-wcg5-mm9h, GHSA-8f24-v5vv-gm5j
