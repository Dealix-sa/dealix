name: Dealix Revenue Sprint Kit Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  revenue-sprint-kit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify public Revenue Sprint Kit
        run: python scripts/verify_revenue_sprint_kit.py

      - name: Verify private Revenue Sprint Kit templates
        run: python private_ops/verify_revenue_sprint_kit.py

      - name: Verify no autonomous external actions
        run: python scripts/verify_no_autonomous_external_actions.py

      - name: Compile kit scripts
        run: |
          python -m compileall \
            scripts/dealix_revenue_sprint_kit.py \
            scripts/verify_revenue_sprint_kit.py \
            scripts/verify_no_autonomous_external_actions.py \
            private_ops/verify_revenue_sprint_kit.py
