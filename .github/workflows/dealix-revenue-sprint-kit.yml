name: Dealix Revenue Sprint Kit Checks

on:
  pull_request:
    paths:
      - "docs/offers/revenue_sprint/**"
      - "docs/delivery/revenue_sprint/**"
      - "docs/trust/NO_OVERCLAIM_POLICY.md"
      - "scripts/verify_revenue_sprint_kit.py"
      - "scripts/verify_no_autonomous_external_actions.py"
      - ".github/workflows/dealix-revenue-sprint-kit.yml"
  push:
    branches: [main]

jobs:
  revenue-sprint-kit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify public Revenue Sprint Kit
        run: python scripts/verify_revenue_sprint_kit.py

      - name: Verify no forbidden claims in kit content
        run: python scripts/verify_no_autonomous_external_actions.py
