name: Dealix Founder Frontend Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  founder-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
