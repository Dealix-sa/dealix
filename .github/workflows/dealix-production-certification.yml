name: dealix-production-certification

# The harder gate. Runs on pushes to main and before tagging a release.
# Additionally runs the placeholder-files audit as a non-blocking warning and
# builds the frontend to prove the deploy will actually start.

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: read

concurrency:
  group: dealix-production-certification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  certify:
    name: production certification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Manifest gate (verify_everything)
        run: python scripts/verify_everything.py

      - name: Placeholder-files audit (warn only)
        run: python scripts/verify_non_empty_files.py || echo "::warning::placeholder files remain (see docs/ops/DEALIX_MISSING_SYSTEMS.md)"

      - name: Frontend install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Production certification result
        run: |
          echo "PRODUCTION CERTIFICATION: PASS"
