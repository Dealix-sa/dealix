name: dealix-ultimate-operating-layer

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML (verifier dependency)
        run: python -m pip install --upgrade pip pyyaml fastapi pydantic

      - name: Verify Policy-as-Code
        run: python scripts/verify_policy_as_code.py

      - name: Verify Agent Registry
        run: python scripts/verify_agent_registry.py

      - name: Verify Eval Gate
        run: python scripts/verify_eval_gate.py

      - name: Verify Prompt / Output Quality
        run: python scripts/verify_prompt_output_quality.py

      - name: Master verifier
        run: python scripts/verify_ultimate_operating_layer.py

      - name: Fail if apps/web missing
        run: |
          if [ ! -d apps/web ]; then
            echo "::error::apps/web is missing. Founder Console must exist."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend deps
        run: npm --prefix apps/web ci --no-audit --no-fund

      - name: Build founder console
        run: npm --prefix apps/web run build

      - name: Summary
        run: |
          echo "## Dealix Ultimate Operating Layer — verifier" >> $GITHUB_STEP_SUMMARY
          echo "- Policy / Registry / Eval / Prompt-output: OK" >> $GITHUB_STEP_SUMMARY
          echo "- Master verifier: OK" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend build: OK" >> $GITHUB_STEP_SUMMARY
