name: dealix-ultimate-operating-layer

# Verifies the Dealix Ultimate Operating Layer end to end:
#   policy-as-code  + agent registry + eval gate + prompt/output quality
#   + control plane stage files + frontend build.

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Show repo state
        shell: bash
        run: |
          set -eux
          pwd
          ls -la
          ls -la scripts | head -30
          ls -la policies registries evals/gates apps/web 2>/dev/null || true

      - name: Install minimal Python deps
        shell: bash
        run: |
          set -eux
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir PyYAML

      - name: Policy check
        run: python scripts/verify_policy_as_code.py

      - name: Agent registry check
        run: python scripts/verify_agent_registry.py

      - name: Eval gate check
        run: python scripts/verify_eval_gate.py

      - name: Prompt/output quality check
        run: python scripts/verify_prompt_output_quality.py

      - name: Ultimate Operating Layer master verifier
        run: python scripts/verify_ultimate_operating_layer.py

      - name: Setup Node
        if: hashFiles('apps/web/package.json') != ''
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install apps/web deps
        if: hashFiles('apps/web/package.json') != ''
        working-directory: apps/web
        run: npm ci

      - name: Build apps/web
        if: hashFiles('apps/web/package.json') != ''
        working-directory: apps/web
        run: npm run build

      - name: Frontend missing — fail
        if: hashFiles('apps/web/package.json') == ''
        run: |
          echo "apps/web/package.json missing — Founder Console frontend is required"
          exit 1
