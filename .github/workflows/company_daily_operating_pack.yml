name: Company Daily Operating Pack

on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 * * *'

permissions:
  contents: read
  actions: read

jobs:
  company-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: python -m pip install pyyaml

      - name: Generate company daily pack
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          chmod +x scripts/dealix_company_day.sh || true
          ./scripts/dealix_company_day.sh

      - name: Upload company daily pack
        uses: actions/upload-artifact@v7
        with:
          name: company-daily-operating-pack
          path: |
            company/daily/
            founder_os/output/
