name: Dealix Daily Self Runner

on:
  workflow_dispatch:
  schedule:
    # 07:15 Asia/Riyadh daily
    - cron: "15 4 * * *"

permissions:
  contents: read
  actions: read

concurrency:
  group: dealix-daily-self-runner
  cancel-in-progress: false

jobs:
  daily-self-runner:
    name: Draft-only daily Dealix run
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run daily self runner
        run: |
          python scripts/ops/dealix_daily_self_runner.py

      - name: Upload daily reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dealix-daily-self-runner
          path: |
            reports/autopilot/
            reports/operator/
            business/_data/
            business/crm/exports/
            business/reports/exports/
          if-no-files-found: warn
