name: Recurring Revenue Radar Daily

# Surfaces which accounts should convert one-off Sprints into recurring
# Managed-Ops retainers — ranked by expected incremental MRR. Draft-only,
# approval-first; runs fully offline on the committed seed (no secrets, no
# external sends). 05:00 UTC = 08:00 Asia/Riyadh.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 0-4"

permissions:
  contents: read

concurrency:
  group: dealix-recurring-revenue-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AUTO_SEND_ENABLED: "false"
      EXTERNAL_OUTREACH_ENABLED: "false"
      AGENT_APPROVAL_MODE: "required"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal deps
        run: python -m pip install --upgrade pip && pip install "pydantic>=2.9,<3"
      - name: Verify radar doctrine invariants
        run: python scripts/verify_recurring_revenue_radar.py
      - name: Run daily radar (writes founder brief)
        run: python scripts/run_recurring_revenue_radar.py
      - name: Upload founder brief
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recurring-revenue-radar-${{ github.run_id }}
          path: |
            data/founder_briefs/recurring_revenue_radar_*.md
            data/recurring_revenue/radar_log.json
          retention-days: 30
          if-no-files-found: ignore
