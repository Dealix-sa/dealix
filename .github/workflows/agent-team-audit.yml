name: Agent Team Audit

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-team-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-team-audit:
    name: Agent Team Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit agent team (strict — fails on gaps)
        run: python scripts/audit_agent_team.py --strict

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-team-audit
          path: reports/agents/agent_team_audit.*
          if-no-files-found: ignore
