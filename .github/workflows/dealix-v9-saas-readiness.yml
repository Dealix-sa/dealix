name: Dealix V9 SaaS Readiness
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'product/**'
      - 'billing/**'
      - 'db/**'
      - 'frontend/src/app/api/**'
      - 'scripts/dealix_*'
      - '.github/workflows/dealix-v9-saas-readiness.yml'
permissions:
  contents: read
jobs:
  v9-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/dealix_v9_readiness_check.py
      - run: python scripts/dealix_plan_limit_check.py
      - run: python scripts/dealix_saas_maturity_score.py
