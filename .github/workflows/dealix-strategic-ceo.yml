name: Dealix Strategic CEO Checks
on:
  pull_request:
  push:
    branches: [main]
jobs:
  strategic-ceo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify strategic CEO system
        run: python scripts/verify_strategic_ceo_system.py
