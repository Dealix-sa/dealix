# Daily Commercial Launch OS draft factory.
# Draft-only. No secrets. No external sending. Artifacts only.
name: Commercial draft factory

on:
  schedule:
    - cron: "0 5 * * *"  # 08:00 KSA
  workflow_dispatch:
    inputs:
      target:
        description: "Minimum drafts to generate"
        default: "400"
        required: false

# Least privilege: read-only token, no write access to the repo.
permissions:
  contents: read

jobs:
  drafts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate 400+ founder-review drafts (no send)
        run: python scripts/commercial_generate_400_drafts.py --target "${{ github.event.inputs.target || '400' }}"

      - name: Safety audit — prove no external sending
        run: python scripts/commercial_safety_audit.py

      - name: Launch readiness
        run: python scripts/commercial_launch_readiness.py

      - name: Commercial Launch OS tests
        run: |
          pip install -r requirements.txt
          python -m pytest -q -p no:cacheprovider \
            tests/test_commercial_generate_400_drafts.py \
            tests/test_commercial_safety_audit.py \
            tests/test_commercial_launch_readiness.py \
            tests/test_commercial_no_external_send.py \
            tests/test_commercial_quality_gate.py \
            tests/test_commercial_compliance_gate.py \
            tests/test_commercial_outputs_schema.py \
            tests/test_commercial_founder_review_report.py \
            tests/test_commercial_seed_leads_validate.py

      - name: Upload founder review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: founder-review-queue
          path: outputs/commercial_launch/**
          if-no-files-found: error
