name: Revenue Day v2

# Syntax-checks and dry-runs the revenue engine. No external sending.
# Run manually or on a schedule (05:00 UTC = 08:00 Riyadh).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1-5"

concurrency:
  group: dealix-revenue-day-v2
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  revenue-engine:
    name: Revenue Engine v2 dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Script syntax check
        run: bash -n scripts/dealix_revenue_day.sh

      - name: Run revenue engine
        run: python company/revenue_engine/revenue_engine_v2.py

      - name: Verify outputs
        run: |
          TODAY=$(date +%F)
          RUNTIME="company/runtime/revenue/${TODAY}"
          echo "Runtime dir: ${RUNTIME}"
          ls "${RUNTIME}/"
          echo "---"
          echo "CEO Revenue Report preview:"
          head -20 "${RUNTIME}/CEO_REVENUE_REPORT.md"
