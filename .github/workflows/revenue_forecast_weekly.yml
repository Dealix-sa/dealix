name: Revenue Forecast OS — Weekly 90-Day Forecast

on:
  schedule:
    - cron: "0 4 * * 3"  # Every Wednesday 07:00 AST (04:00 UTC)
  workflow_dispatch:

concurrency:
  group: revenue-forecast-weekly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  revenue-forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install httpx
      - name: Run revenue forecast (dry-run)
        env:
          PYTHONIOENCODING: utf-8
          APP_ENV: test
        run: python3 scripts/run_revenue_forecast.py --dry-run
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: revenue-forecast-${{ github.run_id }}
          path: data/founder_briefs/REVENUE_FORECAST_*.md
          retention-days: 30
          if-no-files-found: ignore
