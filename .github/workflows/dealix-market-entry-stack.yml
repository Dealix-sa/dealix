name: dealix-market-entry-stack

on:
  pull_request:
    paths:
      - "docs/positioning/**"
      - "docs/intelligence/**"
      - "docs/product/**"
      - "docs/revenue/**"
      - "docs/delivery/**"
      - "docs/finance/**"
      - "docs/customer_success/**"
      - "docs/ops/**"
      - "scripts/verify_market_entry_stack.py"
      - ".github/workflows/dealix-market-entry-stack.yml"
  push:
    branches: ["main", "claude/**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/verify_market_entry_stack.py
