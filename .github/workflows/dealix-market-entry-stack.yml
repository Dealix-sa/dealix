name: dealix-market-entry-stack

on:
  schedule:
    - cron: "33 6 * * 1"
  pull_request:

permissions:
  contents: read

jobs:
  market-entry-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml

      - name: Verify market entry stack
        run: make market-entry-stack

      - name: Smoke internal API (server may be absent — safe)
        run: make smoke-internal-api
