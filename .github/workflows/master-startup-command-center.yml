name: Master Startup Command Center (V7)

# Verifies all V7 OS layers and the master command center.
# Artifact-only. No secrets. No external sending. No commits.

on:
  workflow_dispatch: {}
  schedule:
    # 06:00 UTC Monday = 09:00 Asia/Riyadh weekly.
    - cron: "0 6 * * 1"

concurrency:
  group: dealix-master-startup-command-center
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  master-command:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify company utilization
        run: python scripts/company_utilization_verify.py

      - name: Verify startup OS
        run: python scripts/startup_os_verify.py

      - name: Verify final launch control
        run: python scripts/final_launch_control_verify.py

      - name: Verify master startup command center
        run: python scripts/master_startup_command_verify.py

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-command-${{ github.run_id }}
          path: |
            outputs/company_utilization/
            outputs/startup_os/
            outputs/launch_control/
            outputs/master_command_center/
          if-no-files-found: warn
          retention-days: 14
