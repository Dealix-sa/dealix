name: Dealix V15 Founder Autopilot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: read

jobs:
  founder-autopilot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run V15 founder autopilot checks
        run: |
          python scripts/dealix_v15_readiness_check.py
          python scripts/dealix_v15_daily_run.py
