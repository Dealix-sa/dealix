name: Dealix Productization Engineering Checks
on:
  pull_request:
  push:
    branches: [main]
jobs:
  productization-engineering:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify productization engineering OS
        run: python scripts/verify_productization_engineering_os.py
      - name: Compile
        run: python -m compileall scripts ops_runtime dealix_cli
