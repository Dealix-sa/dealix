name: Dealix Company OS Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  company-os:
    name: Dealix Company OS Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Company OS files
        run: python3 scripts/verify_company_os.py --strict

      - name: Emit JSON report
        if: always()
        run: python3 scripts/verify_company_os.py --json > company_os_report.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: company-os-report
          path: company_os_report.json
          if-no-files-found: warn
