name: dealix-company-os
on:
  workflow_dispatch:
  push:
    paths:
      - "apps/web/**"
      - "api/internal/**"
      - "api/routers/internal/**"
      - "policies/**"
      - "registries/**"
      - "evals/**"
      - "scripts/verify_company_os.py"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml fastapi httpx pydantic
      - run: python scripts/verify_company_os.py
      - run: python scripts/smoke_internal_api.py
