name: Weekly KPI Scorecard

# Composes the last 7 daily KPI snapshots (data/kpi_snapshots/) into a
# bilingual markdown scorecard at data/scorecards/YYYY-WW.md. Uploaded
# as a CI artifact — founder downloads from the Actions tab.
#
# Doctrine: read-only. Never sends. Founder reviews before any share.

on:
  schedule:
    - cron: "0 6 * * 0"  # 06:00 UTC Sun ≈ 09:00 KSA
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    name: Build weekly scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download recent KPI snapshot artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: daily_kpi_snapshot.yml
          workflow_conclusion: success
          name_is_regexp: true
          name: kpi-snapshot-.*
          path: data/kpi_snapshots/
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install pydantic structlog httpx tenacity

      - name: Build scorecard (markdown)
        run: python scripts/weekly_scorecard.py

      - name: Upload scorecard artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-kpi-scorecard-${{ github.run_number }}
          path: data/scorecards/
          retention-days: 90
