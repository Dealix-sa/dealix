name: GTM Quality Gate

# Doctrine gate for the Market Production OS: 250 drafts/day, 0 auto-sends.
# Fails on missing unsubscribe, misleading subjects, cold WhatsApp, scraping
# sources, guaranteed claims, sub-P1 personalization, or any auto-send.

on:
  pull_request:
    paths:
      - "auto_client_acquisition/market_production_os/**"
      - "scripts/gtm_quality_gate.py"
      - "scripts/run_gtm_draft_day.py"
      - "scripts/generate_market_production_schemas.py"
      - "tests/test_market_production_os.py"
      - "tests/test_no_auto_send_market_production.py"
      - "schemas/**"
  push:
    branches: [main]
    paths:
      - "auto_client_acquisition/market_production_os/**"
  workflow_dispatch:

concurrency:
  group: gtm-quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio pytest-cov pytest-mock httpx aiosqlite

      - name: Validate JSON schemas are in sync
        run: |
          python scripts/generate_market_production_schemas.py
          git diff --exit-code -- schemas/ || (echo "schemas out of sync — run scripts/generate_market_production_schemas.py" && exit 1)

      - name: GTM quality + compliance gate
        run: python scripts/gtm_quality_gate.py

      - name: Doctrine + unit tests
        env:
          APP_ENV: test
        run: |
          pytest -q --no-cov -p no:cacheprovider \
            tests/test_market_production_os.py \
            tests/test_no_auto_send_market_production.py \
            tests/test_no_cold_whatsapp.py \
            tests/test_no_guaranteed_claims.py \
            tests/test_no_scraping_engine.py \
            tests/test_no_linkedin*.py
