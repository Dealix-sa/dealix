name: GTM Quality Gate

# Executable Market Production OS doctrine: validates outreach drafts and the
# sending ramp. Drafts only — this workflow never sends, charges, or scrapes.
# Fails the build if the gate or sending-ramp contracts regress.

on:
  push:
    branches:
      - main
      - 'claude/**'
      - 'feat/**'
      - 'fix/**'
    paths:
      - 'auto_client_acquisition/gtm_os/**'
      - 'tests/test_gtm_*.py'
      - 'scripts/gtm_*.py'
      - 'scripts/gen_gtm_schemas.py'
      - 'data/gtm/**'
      - 'dealix/contracts/schemas/outreach_draft.schema.json'
      - 'dealix/contracts/schemas/sending_plan.schema.json'
      - 'dealix/contracts/schemas/prospect.schema.json'
      - 'dealix/contracts/schemas/company_signal.schema.json'
      - 'dealix/contracts/schemas/reply.schema.json'
      - 'dealix/contracts/schemas/suppression_entry.schema.json'
      - '.github/workflows/gtm-quality-gate.yml'
  pull_request:
    paths:
      - 'auto_client_acquisition/gtm_os/**'
      - 'tests/test_gtm_*.py'
      - 'scripts/gtm_*.py'
      - 'scripts/gen_gtm_schemas.py'
      - 'data/gtm/**'
      - 'dealix/contracts/schemas/outreach_draft.schema.json'
      - 'dealix/contracts/schemas/sending_plan.schema.json'
      - 'dealix/contracts/schemas/prospect.schema.json'
      - 'dealix/contracts/schemas/company_signal.schema.json'
      - 'dealix/contracts/schemas/reply.schema.json'
      - 'dealix/contracts/schemas/suppression_entry.schema.json'
      - '.github/workflows/gtm-quality-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gtm-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gtm-gate:
    name: GTM draft + ramp doctrine gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: test
      APP_DEBUG: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: GTM contract tests (gate, ramp, records, schemas, scripts)
        run: |
          python -m pytest \
            tests/test_gtm_draft_quality_gate.py \
            tests/test_gtm_sending_ramp.py \
            tests/test_gtm_records.py \
            tests/test_gtm_schema_consistency.py \
            tests/test_gtm_scripts.py \
            -q --no-cov

      - name: Schemas are in sync with models
        run: |
          python3 scripts/gen_gtm_schemas.py
          git diff --exit-code -- dealix/contracts/schemas/ \
            || (echo "::error::GTM schemas drifted — run python3 scripts/gen_gtm_schemas.py" && exit 1)

      - name: Run the quality gate over sample drafts (audit) + daily command
        run: |
          python3 scripts/gtm_quality_gate.py --report reports/gtm/DRAFT_QUALITY_REPORT.md
          python3 scripts/gtm_daily_command.py --domain-age-days 10 --domain-health healthy

      - name: Upload GTM reports
        uses: actions/upload-artifact@v4
        with:
          name: gtm-quality-reports-${{ github.run_id }}
          path: reports/gtm/*.md
          retention-days: 30
          if-no-files-found: warn
