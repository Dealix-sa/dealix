name: Dealix Stage Evidence Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  stage-evidence:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify stage evidence automation
        run: python scripts/verify_stage_evidence_automation.py

      - name: Compile stage evidence automation
        run: python -m compileall execution_engine dealix_cli scripts

      - name: Install pytest
        run: python -m pip install --quiet pytest

      - name: Run execution-engine evidence tests
        run: |
          PYTHONPATH=. python -m pytest tests/unit/test_execution_engine_evidence.py -v \
            --confcutdir=tests/unit --rootdir=tests/unit -o addopts=""
