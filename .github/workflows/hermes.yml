name: Hermes Agent OS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  hermes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements-hermes.txt
      - run: python scripts/verify_hermes_agent_os.py
      - run: python scripts/hermes_generate_reports.py
      - uses: actions/upload-artifact@v4
        with:
          name: hermes-runtime-reports
          path: docs/hermes/runtime/
