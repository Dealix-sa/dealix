name: Hermes Agent OS

on:
  workflow_dispatch:
    inputs:
      agent:
        description: Optional Hermes agent id
        required: false
        type: string
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  hermes:
    name: Generate Hermes reports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Hermes dependencies
        run: python -m pip install -r requirements-hermes.txt

      - name: Verify Hermes Agent OS
        run: python scripts/verify_hermes_agent_os.py

      - name: Generate all Hermes reports
        if: ${{ inputs.agent == '' }}
        run: python scripts/hermes_generate_reports.py

      - name: Generate selected Hermes report
        if: ${{ inputs.agent != '' }}
        run: python scripts/hermes_generate_reports.py --agent '${{ inputs.agent }}'

      - name: Upload Hermes reports
        uses: actions/upload-artifact@v4
        with:
          name: hermes-runtime-reports
          path: docs/hermes/runtime/
