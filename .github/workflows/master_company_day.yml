name: Master Company Day

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'

permissions:
  contents: read
  actions: read

jobs:
  master-company-day:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Python minimal deps
        run: python -m pip install pyyaml

      - name: Run master company day
        env:
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          API_KEYS: ${{ secrets.API_KEYS }}
          ADMIN_API_KEYS: ${{ secrets.ADMIN_API_KEYS }}
          DEALIX_ADMIN_API_KEY: ${{ secrets.DEALIX_ADMIN_API_KEY }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          GREEN_API_INSTANCE_ID: ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MOYASAR_SECRET_KEY: ${{ secrets.MOYASAR_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: ./scripts/dealix_master_company_day.sh

      - name: Upload master company artifacts
        uses: actions/upload-artifact@v4
        with:
          name: master-company-day
          path: |
            company/reports/
            company/outbox/
            company/daily/
            company/lead_research/
            company/crm/
            founder_os/output/
