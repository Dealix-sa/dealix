name: Dealix Company OS Security

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/verify_tier0_safety.py"
      - "scripts/verify_trust_boundary_terms.py"
      - "scripts/verify_no_autonomous_external_actions.py"
      - ".github/workflows/dealix-company-os-security.yml"
  pull_request:
    paths:
      - "docs/**"
      - "scripts/verify_tier0_safety.py"
      - "scripts/verify_trust_boundary_terms.py"
      - "scripts/verify_no_autonomous_external_actions.py"
      - ".github/workflows/dealix-company-os-security.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: python -m pip install --upgrade pip pyyaml
      - name: Verify tier 0 safety
        run: python scripts/verify_tier0_safety.py
      - name: Verify trust boundary terms
        run: python scripts/verify_trust_boundary_terms.py
      - name: Verify no autonomous external actions
        run: python scripts/verify_no_autonomous_external_actions.py
