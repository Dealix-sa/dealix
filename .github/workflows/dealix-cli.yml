name: Dealix CLI Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify CLI
        run: python scripts/verify_cli.py

      - name: Compile CLI
        run: python -m compileall dealix_cli scripts
