name: GCC Expansion Intelligence — Weekly Market Scan

on:
  schedule:
    - cron: "0 3 * * 2"  # Tuesday 06:00 AST (03:00 UTC)
  workflow_dispatch:

concurrency:
  group: gcc-expansion-weekly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gcc-market-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install httpx
      - name: Run GCC expansion scan (dry-run)
        env:
          PYTHONIOENCODING: utf-8
          APP_ENV: test
        run: python3 scripts/run_gcc_expansion_scan.py --dry-run
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gcc-expansion-${{ github.run_id }}
          path: data/founder_briefs/GCC_EXPANSION_*.md
          retention-days: 30
          if-no-files-found: ignore
