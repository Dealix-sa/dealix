name: Media & Social Calendar

# Generates the 30-day content calendar (planning only) and verifies the
# media/social OS has no auto-post code. NEVER posts. No secrets. Artifact-only.

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * 1"  # Mondays 05:30 UTC

permissions:
  contents: read

jobs:
  calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate calendar
        run: python scripts/media_social_calendar_generate.py
      - name: Verify media/social OS
        run: python scripts/media_social_verify.py
      - name: Upload calendar evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: media-social-calendar
          path: outputs/media_social/
          retention-days: 14
