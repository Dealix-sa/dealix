name: Dealix CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  builder-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dealix-builder-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - run: npm test
      - run: node src/cli.js doctor
