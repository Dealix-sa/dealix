name: Dealix Launch Gates

# Read-only verification gate for the Wave 8 launch path. Does not deploy,
# does not send anything, does not need write access or secrets.
on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "scripts/verify_dealix_*.py"
      - "scripts/run_dealix_e2e_dry_run.py"
      - "scripts/create_customer_workspace.py"
      - "scripts/_wave8_scan.py"
      - "customers/_template/**"
      - "docs/03_governance/**"
      - "data/outreach/**"
      - ".github/workflows/dealix-launch-gates.yml"

# Minimum privilege: read-only, no write scopes (GitHub-recommended hardening).
permissions:
  contents: read

jobs:
  launch-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Verifiers are stdlib-only; no project deps required for the gate.
      - name: Verify positioning
        run: python scripts/verify_dealix_positioning.py

      - name: Verify module status
        run: python scripts/verify_dealix_module_status.py

      - name: Verify growth assets
        run: python scripts/verify_dealix_growth_assets.py

      - name: Verify launch readiness
        run: python scripts/verify_dealix_launch_readiness.py --no-write

      - name: Run E2E dry run (if present)
        run: |
          if [ -f scripts/run_dealix_e2e_dry_run.py ]; then
            python scripts/run_dealix_e2e_dry_run.py
          else
            echo "E2E dry run script not present — skipping"
          fi
