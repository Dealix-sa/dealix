name: Intake Day v2

# Runs intake engine and syntax checks. No external sending.
# 06:55 UTC = 09:55 Riyadh — after micro_day and before revenue_day.

on:
  workflow_dispatch:
  schedule:
    - cron: "55 6 * * 1-5"

concurrency:
  group: dealix-intake-day-v2
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  intake-engine:
    name: Intake Engine v2 dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Script syntax check
        run: bash -n scripts/dealix_intake_day.sh

      - name: Run intake engine
        run: python company/intake/intake_engine.py

      - name: Verify outputs
        run: |
          TODAY=$(date +%F)
          RUNTIME="company/runtime/intake/${TODAY}"
          echo "Runtime dir: ${RUNTIME}"
          ls "${RUNTIME}/"
          echo "---"
          echo "Intake Summary preview:"
          head -30 "${RUNTIME}/INTAKE_SUMMARY.md"

      - name: Upload intake pack
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: intake-pack-${{ github.run_number }}
          path: company/runtime/intake/
          retention-days: 7
