name: dealix-brand-growth-operating-layer

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  brand-growth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml

      - name: Verify brand-growth operating layer
        run: make brand-growth-operating-layer
