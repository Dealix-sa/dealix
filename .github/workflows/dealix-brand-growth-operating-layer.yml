name: dealix-brand-growth-operating-layer

on:
  pull_request:
    paths:
      - "docs/brand/**"
      - "docs/positioning/**"
      - "docs/intelligence/**"
      - "docs/growth/**"
      - "docs/marketing/**"
      - "docs/product/**"
      - "apps/web/components/brand/**"
      - "apps/web/lib/brand-tokens.ts"
      - "apps/web/styles/brand.css"
      - "scripts/verify_brand_*.py"
      - "scripts/verify_growth_system.py"
      - "scripts/verify_marketing_system.py"
      - "scripts/verify_product_distribution.py"
      - "scripts/verify_brand_growth_operating_layer.py"
      - ".github/workflows/dealix-brand-growth-operating-layer.yml"
  push:
    branches: ["main", "claude/**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Environment
        run: |
          python --version
          which python
          python -m pip install pyyaml
      - name: Verify brand
        run: python -u scripts/verify_brand_system.py
      - name: Verify growth
        run: python -u scripts/verify_growth_system.py
      - name: Verify marketing
        run: python -u scripts/verify_marketing_system.py
      - name: Verify product distribution
        run: python -u scripts/verify_product_distribution.py
      - name: Verify brand+growth composite
        run: python -u scripts/verify_brand_growth_operating_layer.py
