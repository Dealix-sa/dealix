name: Dealix Dashboard Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dashboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify dashboard
        run: python scripts/verify_dashboard.py

      - name: Verify full ops
        run: python scripts/verify_full_ops.py
