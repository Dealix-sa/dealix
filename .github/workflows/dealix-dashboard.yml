name: Dealix Dashboard

on:
  push:
    branches: [main]
    paths:
      - "internal_dashboard/**"
      - "dashboard_data/**"
      - "scripts/verify_dashboard_v2.py"
      - ".github/workflows/dealix-dashboard.yml"
  pull_request:
    paths:
      - "internal_dashboard/**"
      - "dashboard_data/**"
      - "scripts/verify_dashboard_v2.py"
      - ".github/workflows/dealix-dashboard.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: python -m pip install --upgrade pip pyyaml
      - name: Verify dashboard v2
        run: python scripts/verify_dashboard_v2.py
