version: 1.0

whatsapp:
  first_touch_ar: |
    السلام عليكم، أنا سامي من Dealix.

    لاحظت أن {{company_name}} ممكن تستفيد من نظام يربط {{pain_angle}} بشكل أوضح.

    نحن نبني للشركات نظام تشغيل ذكي يحول واتساب، المتابعة، التقييمات، والعروض إلى pipeline وتقارير يومية تساعد الإدارة تعرف:
    كم فرصة دخلت؟
    مين يحتاج متابعة؟
    وين تضيع الفرص؟
    وش القرار المطلوب اليوم؟

    أقدر أرسل لك مثال مختصر على النظام وكيف ممكن يخدمكم؟

  followup_1_ar: |
    للتوضيح أكثر، Dealix ليس بوت ولا CRM عادي.

    هو Command Center يربط:
    العملاء + المتابعة + التقارير + التقييمات + قرارات الإدارة.

    البداية تكون صغيرة: نختار مسار واحد مثل lead → follow-up → booking/report ونثبته خلال 7-14 يوم.

    مناسب أرسل لك نموذج تشخيص سريع؟

  followup_2_ar: |
    آخر متابعة مني حتى لا أزعجك.

    عندنا طريقة بسيطة نطلع فيها خلال 15 دقيقة:
    1. أين تضيع الفرص؟
    2. ما أكثر متابعة متأخرة؟
    3. ما أول نظام ممكن يرفع وضوح الإدارة؟

    إذا مناسب أرسل لك ملف مختصر.

email:
  subject_ar: "فكرة نظام تشغيل ذكي لـ {{company_name}}"
  body_ar: |
    السلام عليكم،

    أنا سامي من Dealix.

    أرسل لك فكرة مختصرة لأن كثير من الشركات تخسر فرصاً بسبب تشتت واتساب، ضعف المتابعة، عدم وضوح التقييمات، وغياب التقارير اليومية.

    Dealix يبني نظام تشغيل ذكي للشركات يربط:
    - العملاء والفرص
    - المتابعة والمهام
    - التقييمات وصوت العميل
    - العروض والقرارات
    - التقارير التنفيذية

    الفكرة ليست تغيير كل أنظمة الشركة، بل نبدأ بمسار واحد واضح ونقيس أثره خلال 7-14 يوم.

    أقترح تشخيص سريع لـ {{company_name}} نحدد فيه 3 نقاط يمكن تحسينها فوراً.

    تحياتي،
    سامي
    Dealix

call_script_ar: |
  الهدف من المكالمة ليس بيع نظام كامل فوراً.
  الهدف: اكتشاف تسرب تشغيلي واضح.

  الأسئلة:
  1. كم استفسار يجيكم أسبوعياً؟
  2. وين تجيكم أغلب الاستفسارات؟
  3. مين مسؤول عن المتابعة؟
  4. هل تعرفون كم فرصة لم تتم متابعتها؟
  5. هل الإدارة تستلم تقرير أسبوعي واضح؟
  6. ما أكثر سبب يخلي العميل ينسحب؟
  7. لو بنبدأ بشيء واحد خلال 14 يوم، وش أكثر مسار يهمكم؟

proposal_intro_ar: |
  نقترح البدء بنظام تشغيلي صغير يثبت القيمة قبل التوسع:
  التقاط الفرص، تنظيم المتابعة، إظهار التسربات، وإرسال تقرير أسبوعي للإدارة.
