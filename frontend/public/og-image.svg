<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Dealix — governed AI operations partner">
  <title>Dealix — governed AI operations partner</title>
  <defs>
    <radialGradient id="bg" cx="20%" cy="20%" r="80%">
      <stop offset="0%" stop-color="hsl(220 28% 14%)"/>
      <stop offset="60%" stop-color="hsl(220 30% 8%)"/>
      <stop offset="100%" stop-color="hsl(220 30% 5%)"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="hsl(162 70% 42%)"/>
      <stop offset="100%" stop-color="hsl(42 80% 56%)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- subtle 8px grid suggestion -->
  <g stroke="hsl(220 20% 22%)" stroke-width="1" opacity="0.25">
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
  </g>
  <!-- wordmark -->
  <g transform="translate(80, 230)">
    <text font-family="Outfit, Inter, system-ui, sans-serif" font-weight="700" font-size="160" letter-spacing="-0.03em" fill="hsl(210 20% 96%)">dealix</text>
    <rect x="592" y="42" width="22" height="22" rx="4" fill="hsl(162 70% 42%)"/>
  </g>
  <!-- tag line -->
  <text x="80" y="460" font-family="Outfit, Inter, system-ui, sans-serif" font-weight="500" font-size="36" fill="hsl(215 15% 78%)">
    Governed AI operations for Saudi enterprises.
  </text>
  <!-- AR tag line (right side) -->
  <text x="1120" y="510" font-family="Tajawal, system-ui, sans-serif" font-weight="500" font-size="32" fill="hsl(215 15% 78%)" text-anchor="end" direction="rtl">
    عمليات ذكاء اصطناعي محوكمة للمنشآت السعودية.
  </text>
  <!-- accent rule -->
  <rect x="80" y="556" width="160" height="4" rx="2" fill="url(#accent)"/>
  <text x="80" y="596" font-family="Outfit, Inter, system-ui, sans-serif" font-weight="500" font-size="22" fill="hsl(215 15% 60%)">
    SOAEN · Source → Owner → Approval → Evidence → Next Action
  </text>
</svg>
