<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dealix logo mark — geometric "D" with diagonal evidence-line cut.
  Colors follow docs/sales-kit/dealix_brand_guidelines.md:
    Deep Green #0A4D3F (primary mark)
    Gold       #C9A961 (accent — represents the "post-lead" cut line)
  The diagonal cut symbolizes the evidence/SOAEN line that splits "lead arrival"
  from "lead outcome" — Dealix's core promise: prove what happens after the lead.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Dealix">
  <title>Dealix</title>
  <rect width="512" height="512" rx="96" fill="#0A4D3F"/>
  <!-- Outer "D" mark -->
  <path
    d="M 132 96
       L 132 416
       L 296 416
       C 392 416 432 348 432 256
       C 432 164 392 96 296 96
       Z
       M 200 156
       L 296 156
       C 352 156 372 196 372 256
       C 372 316 352 356 296 356
       L 200 356
       Z"
    fill="#F4F0E8"
    fill-rule="evenodd"/>
  <!-- Gold evidence line (diagonal cut) -->
  <path
    d="M 88 380
       L 168 156
       L 200 156
       L 120 380
       Z"
    fill="#C9A961"
    opacity="0.95"/>
</svg>
