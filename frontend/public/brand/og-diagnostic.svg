  <path d="M92 108V76h11.2c7.6 0 12.6 4.3 12.6 11 0 4-1.8 7-5 8.6l6.4 12.4H107l-5.8-10.2H102v10.2H92zm10.8-17.3c3.2 0 5-1.8 5-4.5s-1.8-4.5-5-4.5H102v9z" fill="#C9A961"/>
  <text x="158" y="102" font-family="'Inter', system-ui" font-size="32" font-weight="700" fill="#ECEFEC">Dealix</text>

