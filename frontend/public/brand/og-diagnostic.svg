  <text x="160" y="413" font-family="'Inter', system-ui" font-size="14" font-weight="500" fill="#1F8A5A" text-anchor="middle">PDPL Native</text>

  <rect x="256" y="390" width="160" height="36" rx="18" fill="#C8A86A" opacity="0.15" stroke="#C8A86A" stroke-width="1"/>
  <text x="336" y="413" font-family="'Inter', system-ui" font-size="14" font-weight="500" fill="#C8A86A" text-anchor="middle">ZATCA Ready</text>

