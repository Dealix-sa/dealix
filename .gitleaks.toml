# ═══════════════════════════════════════════════════════════════
# Gitleaks configuration
# Extends default rules with project-specific patterns
# ═══════════════════════════════════════════════════════════════

title = "AI Company Saudi — Gitleaks Config"

[extend]
# Extend default rules
useDefault = true

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-api\d{2}-[A-Za-z0-9_-]{80,}'''
tags = ["key", "anthropic"]

[[rules]]
id = "deepseek-api-key"
description = "DeepSeek API key"
regex = '''sk-[a-f0-9]{32}'''
tags = ["key", "deepseek"]

[[rules]]
id = "groq-api-key"
description = "Groq API key"
regex = '''gsk_[A-Za-z0-9]{40,}'''
tags = ["key", "groq"]

[[rules]]
id = "google-api-key"
description = "Google API key"
regex = '''AIza[0-9A-Za-z_-]{35}'''
tags = ["key", "google"]

[[rules]]
id = "glm-zai-key"
description = "GLM (Z.ai) API key"
regex = '''[a-f0-9]{32}\.[A-Za-z0-9]{16}'''
tags = ["key", "glm"]

[[rules]]
id = "hubspot-access-token"
description = "HubSpot Access Token"
regex = '''pat-[a-z0-9]{2,4}-[a-f0-9-]{36}'''
tags = ["key", "hubspot"]

[allowlist]
description = "Global allowlist"
paths = [
    # Repo-level config / baseline files
    '''\.env\.example$''',
    '''\.gitleaks\.toml$''',
    '''\.secrets\.baseline$''',
    # All test files — fixtures deliberately use obviously-fake values
    # (e.g. sk_live_realdangerous, AKIA0123456789ABCDEF) so the test
    # assertions are clear and self-documenting.
    '''(^|/)tests/''',
    # Docs directory — contains markdown + shell examples that reference
    # env-var placeholders like ${MOYASAR_SECRET_KEY}, not real secrets.
    '''(^|/)docs/''',
    # Ops shell scripts use ${ENV_VAR} references, not hardcoded values.
    '''(^|/)scripts/ops/''',
    # pricing.py:250 — "record_key, ttl_seconds=30" is a Python variable name
    # used as an LRU-cache key, not a secret.
    '''api/routers/pricing\.py$''',
    '''scripts/infra/setup_uptimerobot\.sh$''',
]

regexes = [
    # Template / placeholder patterns
    '''sk-placeholder''',
    '''your-.*-key''',
    '''change-me''',
    '''example-.*''',
    # Python attribute comparisons (test_payment_refund_zatca_v1.py:207)
    '''idempotency_key''',
]
