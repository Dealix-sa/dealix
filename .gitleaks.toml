title = "Dealix Gitleaks Configuration"

[allowlist]
description = "Suppress pre-existing false positives — no real credentials"

# Test files intentionally contain fake key strings (e.g. sk_live_abcdef, AKIA0123...)
# to verify secret redaction and handling logic. None are real credentials.
# Ops scripts reference keys via shell variables (${MOYASAR_KEY}), not hardcoded values.
paths = [
    '''(?i)tests/''',
    '''docs/ops/''',
    '''scripts/ops/''',
]

# Python production code: variable names containing "key" used as function args
# e.g. idem.claim(record_key, ttl_seconds=...) — not credential assignments
regexes = [
    '''record_key,\s+ttl_seconds''',
]
