# .gitleaks.toml — allowlist for pre-existing test fixtures and scan-pattern scripts
# All entries are verified false positives: test fixture keys and grep
# patterns used by verification scripts to DETECT secrets, not real credentials.

[allowlist]
  description = "Test fixtures and secret-scanner grep patterns"
  paths = [
    '''tests/''',
    '''scripts/v7_launch_verify\.sh''',
    '''scripts/v10_master_verify\.sh''',
  ]
