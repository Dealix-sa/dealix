# ═══════════════════════════════════════════════════════════════
# Gitleaks configuration
# Extends default rules with project-specific patterns
# ═══════════════════════════════════════════════════════════════

title = "AI Company Saudi — Gitleaks Config"

[extend]
# Extend default rules
useDefault = true

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-api\d{2}-[A-Za-z0-9_-]{80,}'''
tags = ["key", "anthropic"]

[[rules]]
id = "deepseek-api-key"
description = "DeepSeek API key"
regex = '''sk-[a-f0-9]{32}'''
tags = ["key", "deepseek"]

[[rules]]
id = "groq-api-key"
description = "Groq API key"
regex = '''gsk_[A-Za-z0-9]{40,}'''
tags = ["key", "groq"]

[[rules]]
id = "google-api-key"
description = "Google API key"
regex = '''AIza[0-9A-Za-z_-]{35}'''
tags = ["key", "google"]

[[rules]]
id = "glm-zai-key"
description = "GLM (Z.ai) API key"
regex = '''[a-f0-9]{32}\.[A-Za-z0-9]{16}'''
tags = ["key", "glm"]

[[rules]]
id = "hubspot-access-token"
description = "HubSpot Access Token"
regex = '''pat-[a-z0-9]{2,4}-[a-f0-9-]{36}'''
tags = ["key", "hubspot"]

[allowlist]
description = "Global allowlist"
paths = [
    '''\.env\.example$''',
    '''\.gitleaks\.toml$''',
    '''\.secrets\.baseline$''',
    # Test suites legitimately carry fabricated credentials (e.g. the "no live
    # charge" invariant tests assert a fake sk_live_ value is never used/leaked).
    # Consistent with the existing tests/fixtures allowlist; broadened to all tests.
    '''tests/.*''',
    '''docs/.*\.md$''',
    '''scripts/infra/setup_uptimerobot\.sh$''',
    # Versioned launch/verify scripts embed the secret-detection regex itself
    # (e.g. sk_live_[A-Za-z0-9]{20,}) plus dummy examples like sk_live_xxxx.
    '''scripts/v\d+_.*verify\.sh$''',
    # Doctrine *_verify.py scripts feed fabricated sample secrets to the secret
    # scanner on purpose (e.g. whatsapp_client_os_verify.py calls
    # scan_for_secrets("api_key = sk-...") to assert detection works).
    '''scripts/.*_verify\.py$''',
]

regexes = [
    '''sk-placeholder''',
    '''your-.*-key''',
    '''change-me''',
    '''example-.*''',
]
