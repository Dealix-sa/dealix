# Dealix Machine Registry (canonical YAML)
#
# Every scheduled worker, GitHub Actions cron, daemon, or webhook handler
# that runs on Dealix infrastructure MUST appear here with an owner and
# autonomy class. The registry is the answer to "what is running where, on
# what schedule, with what blast radius?"
#
# Verifier: scripts/verify_machine_registry.py cross-checks .github/workflows/
# entries against this file.

version: 1

# --------------------------------------------------------------------------
# GitHub Actions (scheduled / triggered workflows)
# --------------------------------------------------------------------------
github_workflows:
  - name: business_now_snapshot
    file: .github/workflows/business_now_snapshot.yml
    schedule: on_push_to_transformation
    class: A1
    owner: founder
    purpose: Snapshot business-now metrics on transformation push.

  - name: ci
    file: .github/workflows/ci.yml
    schedule: on_push_pr
    class: A1
    owner: founder
    purpose: Main pytest + lint gate.

  - name: codeql
    file: .github/workflows/codeql.yml
    schedule: weekly
    class: A1
    owner: founder
    purpose: Security scanning (GitHub CodeQL).

  - name: commercial-expand-weekly
    file: .github/workflows/commercial-expand-weekly.yml
    schedule: weekly_sunday
    class: A1
    owner: founder
    purpose: Internal commercial expansion report.

  - name: cto_weekly_anchor
    file: .github/workflows/cto_weekly_anchor.yml
