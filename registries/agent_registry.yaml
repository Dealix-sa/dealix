# Dealix Agent Registry — single source of truth for every AI agent that
# operates inside the Dealix Sovereign AI Operating Company.
#
# Consumed by:
#   * api/internal/runtime_reader.py            (display in Control Plane)
#   * scripts/verify_agent_registry.py          (CI verification)
#   * docs/ai/AGENT_REGISTRY_SYSTEM.md          (human-readable index)
#
# Field meaning:
#   id                    — stable identifier; used in audit logs.
#   name                  — human label shown in the console.
#   purpose               — single sentence: why this agent exists.
#   approval_class_max    — max approval class the agent may request
#                           (A0 read, A1 draft, A2 external-impact,
#                            A3 high-risk → must never be set here).
#   tools                 — bounded list of tool names the agent can call.
#   outputs               — what the agent emits (drafts / scores / reports).
#   external_action_allowed — must be false for every agent. The founder
#                           is the only path to external impact.
#   kill_switch           — must be true. Operator can disable from console.
#   eval_required         — must be true. Agent runs the eval gate.
#   audit_required        — must be true. Every action is logged.
#   owner                 — human accountable for this agent.
#   data_access_level     — which private-runtime subtrees this agent reads.
#   allowed_write_targets — which CSV/JSON paths this agent is allowed to
#                           append to (read_only if empty).

version: 1
owner: founder

agents:
  - id: ceo_copilot
    name: CEO Copilot
    purpose: Summarise the daily founder pulse and recommend the next best action.
    approval_class_max: A1
    tools: [runtime_reader]
    outputs: [daily_brief, next_best_action]
    external_action_allowed: false
    kill_switch: true
    eval_required: true
    audit_required: true
    owner: founder
    data_access_level: full_read
    allowed_write_targets: ["founder/operating_scorecard.md"]

  - id: revenue_research_agent
